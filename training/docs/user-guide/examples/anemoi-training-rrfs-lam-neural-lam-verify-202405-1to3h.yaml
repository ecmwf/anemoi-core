defaults:
  - data: zarr
  - diagnostics: evaluation
  - system: example
  - graph: existing
  - model: graphtransformer
  - training: lam
  - override /diagnostics/plot: rollout_eval
  - _self_

config_validation: True

# One-month RRFS verification defaults (May 2024)
# This variant verifies 1h, 2h, and 3h lead times in one run for
# checkpoints trained with multistep_output=3. In that case the three
# lead times are emitted as out00/out01/out02 at rollout step 0.
# CLI can still override warm_start/start/end/frequency.
data:
  resolution: 3p0km
  frequency: 1h
  timestep: 1h
  datasets:
    data:
      forcing:
        - landcover
        - orography
        - swdown
      diagnostic: []
      processors:
        normalizer:
          config:
            default: "mean-std"
            std: []
            min-max: []
            max: []
            none:
              - landcover
              - orography
              - swdown
              - icmr_850
              - icmr_925
              - snmr_850
              - snmr_925
              - refc

model:
  output_mask:
    _target_: anemoi.training.utils.masks.Boolean1DMask
    nodes_name: ${graph.data}
    attribute_name: cutout_mask

system:
  hardware:
    num_gpus_per_node: 1
    num_nodes: 1
    num_gpus_per_model: 1
  input:
    dataset: /scratch3/NCEPDEV/fv3-cam/Ting.Lei/dr-anemoi-core/anemoi-core/tmp/rrfs-monthly/rrfs-conus-3km-202405-bcmask-time-s.zarr
    graph: /scratch3/NCEPDEV/fv3-cam/Ting.Lei/tlei-anemoi-training/graphs/rrfs-3km-lam-graph-20km.pt
    warm_start: ???
  output:
    root: /scratch3/NCEPDEV/fv3-cam/Ting.Lei/tlei-anemoi-training/verify/

dataloader:
  read_group_size: ${system.hardware.num_gpus_per_model}
  prefetch_factor: 2
  pin_memory: true
  batch_size:
    training: 1
    validation: 1
    test: 1
  num_workers:
    training: 4
    validation: 4
    test: 4
  limit_batches:
    training: 1
    validation: null
    test: null
  validation_rollout: 1
  grid_indices:
    datasets:
      data:
        _target_: anemoi.training.data.grid_indices.MaskedGrid
        nodes_name: ${graph.data}
        node_attribute_name: indices_connected_nodes
  training:
    datasets:
      data:
        dataset: ${system.input.dataset}
        start: "2024-05-02T09:00:00"
        end: "2024-05-31T20:00:00"
        frequency: ${data.frequency}
        drop: [boundary_mask]
  validation:
    datasets:
      data:
        dataset: ${system.input.dataset}
        start: "2024-05-02T09:00:00"
        end: "2024-05-31T20:00:00"
        frequency: ${data.frequency}
        drop: [boundary_mask]
  test:
    datasets:
      data:
        dataset: ${system.input.dataset}
        start: "2024-05-02T09:00:00"
        end: "2024-05-31T20:00:00"
        frequency: ${data.frequency}
        drop: [boundary_mask]

diagnostics:
  plot:
    asynchronous: false
    datashader: false
    datasets_to_plot: [data]
    frequency:
      batch: 100000
      epoch: 1
    sample_idx: 0
    diagnostic_input_reference_fields: [refc]
    parameters:
      - clmr_500
      - clmr_850
      - clmr_925
      - grle_500
      - grle_850
      - grle_925
      - height_200
      - height_500
      - height_850
      - height_925
      - icmr_500
      - icmr_850
      - icmr_925
      - refc
      - rwmr_500
      - rwmr_850
      - rwmr_925
      - snmr_500
      - snmr_850
      - snmr_925
      - temp_200
      - temp_500
      - temp_850
      - temp_925
      - ugrd_200
      - ugrd_500
      - ugrd_850
      - ugrd_925
      - vgrd_200
      - vgrd_500
      - vgrd_850
      - vgrd_925
    precip_and_related_fields: []
    colormaps: {}
    callbacks:
      - _target_: anemoi.training.diagnostics.callbacks.plot.PlotSample
        sample_idx: ${diagnostics.plot.sample_idx}
        parameters: ${diagnostics.plot.parameters}
        per_sample: 6
        accumulation_levels_plot: [0.01]
        output_steps: ${training.multistep_output}
        precip_and_related_fields: ${diagnostics.plot.precip_and_related_fields}
        diagnostic_input_reference_fields: ${diagnostics.plot.diagnostic_input_reference_fields}
        colormaps: ${diagnostics.plot.colormaps}
        every_n_batches: 1
        dataset_names: ${diagnostics.plot.datasets_to_plot}
  export_predictions:
    enabled: true
    format: netcdf
    every_n_batches: 1
    sample_idx: 0
    parameters:
      - clmr_500
      - clmr_850
      - clmr_925
      - grle_500
      - grle_850
      - grle_925
      - height_200
      - height_500
      - height_850
      - height_925
      - icmr_500
      - icmr_850
      - icmr_925
      - refc
      - rwmr_500
      - rwmr_850
      - rwmr_925
      - snmr_500
      - snmr_850
      - snmr_925
      - temp_200
      - temp_500
      - temp_850
      - temp_925
      - ugrd_200
      - ugrd_500
      - ugrd_850
      - ugrd_925
      - vgrd_200
      - vgrd_500
      - vgrd_850
      - vgrd_925
    output_dir: ${system.output.root}/predictions
    start: ${dataloader.training.datasets.data.start}
    frequency: ${data.frequency}

training:
  multistep_input: 2
  multistep_output: 3
  rollout:
    start: 1
    epoch_increment: 0
    max: 1
  load_weights_only: True
  max_epochs: 1
  max_steps: 1
