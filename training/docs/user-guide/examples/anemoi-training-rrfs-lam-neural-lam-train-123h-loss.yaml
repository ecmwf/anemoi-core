defaults:
  - data: zarr
  - dataloader: rrfs_native_no_frequency
  - diagnostics: evaluation_no_plot
  - system: example
  - graph: existing_graph
  - model: graphtransformer
  - training: lam
  - _self_

config_validation: True

data:
  resolution: 3p0km
  frequency: 1h
  timestep: 1h
  forcing: []
  diagnostic: []
  normalizer:
    default: "mean-std"
    std: []
    min-max: []
    max: []
    none:
      - icmr_850
      - icmr_925
      - snmr_850
      - snmr_925
      - refc

system:
  hardware:
    num_gpus_per_node: 1
    num_nodes: 1
    num_gpus_per_model: 1
  input:
    dataset: /scratch3/NCEPDEV/fv3-cam/Ting.Lei/dr-anemoi-core/anemoi-core/tmp/rrfs-monthly/rrfs-conus-3km-202405-bcmask-time-s.zarr
    graph: /scratch3/NCEPDEV/fv3-cam/Ting.Lei/tlei-anemoi-training/graphs/rrfs-3km-lam-graph-20km.pt
  output:
    root: /scratch3/NCEPDEV/fv3-cam/Ting.Lei/tlei-anemoi-training/

dataloader:
  batch_size:
    training: 1
    validation: 1
    test: 1
  num_workers:
    training: 4
    validation: 4
    test: 4
  # Adjust these ranges for your split policy.
  training:
    start: "2024-05-02T09:00:00"
    end: "2024-05-28T23:00:00"
    drop: [boundary_mask]
  validation:
    start: "2024-05-29T00:00:00"
    end: "2024-05-30T23:00:00"
    drop: [boundary_mask]
  test:
    start: "2024-05-31T00:00:00"
    end: "2024-05-31T20:00:00"
    drop: [boundary_mask]
  validation_rollout: 1

training:
  # Input lags: t-1, t
  multistep_input: 2
  # Loss targets per forward pass: t+1h, t+2h, t+3h
  multistep_output: 3
  # Keep one autoregressive call during training; each call carries 3-hour supervised outputs.
  rollout:
    start: 1
    epoch_increment: 0
    max: 1

  max_epochs: 200
  metrics:
    - height_500
    - temp_850
    - ugrd_850
    - vgrd_850
  variable_groups:
    default: sfc
    pl:
      is_pressure_level: True
