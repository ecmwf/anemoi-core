defaults:
  - data: zarr
  - diagnostics: evaluation_no_plot
  - system: example
  - graph: existing
  - model: graphtransformer
  - training: lam
  - _self_

config_validation: True

data:
  resolution: 3p0km
  frequency: 1h
  timestep: 1h
  forcing:
    - landcover
    - orography
    - swdown
  diagnostic: []
  normalizer:
    default: "mean-std"
    std: []
    min-max: []
    max: []
    none:
      - landcover
      - orography
      - icmr_850
      - icmr_925
      - snmr_850
      - snmr_925
      - refc

system:
  hardware:
    num_gpus_per_node: 1
    num_nodes: 1
    num_gpus_per_model: 1
  input:
    dataset: /scratch3/NCEPDEV/fv3-cam/Ting.Lei/dr-anemoi-core/anemoi-core/test-20km-bcmask-time-s.zarr
    graph: /scratch3/NCEPDEV/fv3-cam/Ting.Lei/tlei-anemoi-training/graphs/rrfs-3km-lam-graph-20km.pt
  output:
    root: /scratch3/NCEPDEV/fv3-cam/Ting.Lei/tlei-anemoi-training/

dataloader:
  batch_size:
    training: 1
    validation: 1
    test: 1
  num_workers:
    training: 4
    validation: 4
    test: 4
  read_group_size: ${system.hardware.num_gpus_per_model}
  training:
    datasets:
      data:
        dataset: ${system.input.dataset}
        start: "2024-05-05T00:00:00"
        end: "2024-05-05T23:00:00"
        frequency: ${data.frequency}
        drop: [boundary_mask]
  validation:
    datasets:
      data:
        dataset: ${system.input.dataset}
        start: "2024-05-05T00:00:00"
        end: "2024-05-05T18:00:00"
        frequency: ${data.frequency}
        drop: [boundary_mask]
  test:
    datasets:
      data:
        dataset: ${system.input.dataset}
        start: "2024-05-05T19:00:00"
        end: "2024-05-05T23:00:00"
        frequency: ${data.frequency}
        drop: [boundary_mask]
  grid_indices:
    datasets:
      data:
        _target_: anemoi.training.data.grid_indices.FullGrid
        nodes_name: ${graph.data}

training:
  metrics:
    datasets:
      data:
        - height_500
        - temp_850
        - ugrd_850
        - vgrd_850
  variable_groups:
    datasets:
      data:
        default: sfc
        pl:
          is_pressure_level: True
