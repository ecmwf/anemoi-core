defaults:
  - data: zarr
  - dataloader: native_grid
  - diagnostics: evaluation
  - datamodule: single
  - hardware: example
  - graph: point_wise
  - model: point_wise
  - training: default
  - _self_

config_validation: True

data:
  resolution: 3p0km
  frequency: 1h
  timestep: 1h
  forcing: []
  diagnostic: []

hardware:
  num_gpus_per_node: 1
  paths:
    data: /scratch3/NCEPDEV/fv3-cam/Ting.Lei
    output: /scratch3/NCEPDEV/fv3-cam/Ting.Lei/anemoi-training/
    graph: /scratch3/NCEPDEV/fv3-cam/Ting.Lei/anemoi-training/graphs/
  files:
    dataset: test-data.zarr
    graph: rrfs-3km-subdomain-graph.pt

dataloader:
  batch_size:
    training: 1
    validation: 1
    test: 1
  num_workers:
    training: 4
    validation: 4
    test: 4
  training:
    start: "2024-05-05T00:00:00"
    end: "2024-05-11T23:00:00"
  validation:
    start: "2024-05-12T00:00:00"
    end: "2024-05-12T18:00:00"
  test:
    start: "2024-05-12T19:00:00"
    end: "2024-05-12T23:00:00"

training:
  metrics:
    - height_500
    - temp_850
    - ugrd_850
    - vgrd_850
  variable_groups:
    default: sfc
    pl:
      is_pressure_level: True
