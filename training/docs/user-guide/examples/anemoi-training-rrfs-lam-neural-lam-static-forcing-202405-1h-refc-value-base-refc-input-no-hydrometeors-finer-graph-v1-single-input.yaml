defaults:
  - anemoi-training-rrfs-lam-neural-lam-static-forcing-202405-1h-refc-value-loss-no-refc-input-finer-graph-v1-single-input
  - _self_

# Base single-input finer-graph GraphTransformer experiment:
#   - keep the direct +1h refc-value loss setup
#   - move refc into the normal prognostic/input state
#   - remove all hydrometeor variables from both input and output

system:
  output:
    root: /scratch3/NCEPDEV/fv3-cam/Ting.Lei/tlei-anemoi-training/base_graphtransformer_finer_graph_v1_single_input_refc_input_no_hydrometeors/

data:
  datasets:
    data:
      diagnostic: []

training:
  training_loss:
    datasets:
      data:
        scalers: ['pressure_level', 'general_variable', 'node_weights', 'time_steps', 'refc_range_weight_factors']
  scalers:
    datasets:
      data:
        general_variable:
          weights:
            default: 1
            sphum: 0.6
            temp: 6
            ugrd: 5
            vgrd: 5
            height: 12
            pres_0g: 10
            refc: 20
            clmr: 1
            icmr: 1
            rwmr: 1
            snmr: 1
            grle: 1
        refc_range_weight_factors:
          _target_: anemoi.training.losses.scalers.TargetValueRangeScaler
          variable: refc
          normalization: min-max
          thresholds: [0.0, 20.0, 40.0]
          range_weight_factors: [1, 2, 2, 4]

dataloader:
  training:
    datasets:
      data:
        drop:
          - boundary_mask
          - clmr_925
          - clmr_850
          - clmr_500
          - clmr_200
          - icmr_925
          - icmr_850
          - icmr_500
          - icmr_200
          - rwmr_925
          - rwmr_850
          - rwmr_500
          - rwmr_200
          - snmr_925
          - snmr_850
          - snmr_500
          - snmr_200
          - grle_925
          - grle_850
          - grle_500
          - grle_200
  validation:
    datasets:
      data:
        drop:
          - boundary_mask
          - clmr_925
          - clmr_850
          - clmr_500
          - clmr_200
          - icmr_925
          - icmr_850
          - icmr_500
          - icmr_200
          - rwmr_925
          - rwmr_850
          - rwmr_500
          - rwmr_200
          - snmr_925
          - snmr_850
          - snmr_500
          - snmr_200
          - grle_925
          - grle_850
          - grle_500
          - grle_200
  test:
    datasets:
      data:
        drop:
          - boundary_mask
          - clmr_925
          - clmr_850
          - clmr_500
          - clmr_200
          - icmr_925
          - icmr_850
