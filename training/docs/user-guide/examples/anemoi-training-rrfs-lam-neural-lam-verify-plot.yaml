defaults:
  - data: zarr
  - diagnostics: evaluation
  - system: example
  - graph: existing
  - model: graphtransformer
  - training: lam
  - override /diagnostics/plot: rollout_eval
  - _self_

config_validation: True

# Required inputs (override on CLI)
# system.input.warm_start
# dataloader.*.start / dataloader.*.end

data:
  resolution: 3p0km
  frequency: 1h
  timestep: 1h
  datasets:
    data:
      forcing:
        - landcover
        - orography
        - swdown
      diagnostic: []
      processors:
        normalizer:
          config:
            default: "mean-std"
            std: []
            min-max: []
            max: []
            none:
              - landcover
              - orography
              - swdown
              - icmr_850
              - icmr_925
              - snmr_850
              - snmr_925
              - refc

system:
  hardware:
    num_gpus_per_node: 1
    num_nodes: 1
    num_gpus_per_model: 1
  input:
    dataset: /scratch3/NCEPDEV/fv3-cam/Ting.Lei/dr-anemoi-core/anemoi-core/test-20km-bcmask-time-s.zarr
    # Base graph filename; training will append _{dataset_name}.pt automatically.
    graph: /scratch3/NCEPDEV/fv3-cam/Ting.Lei/tlei-anemoi-training/graphs/rrfs-3km-lam-graph-20km.pt
    warm_start: ???
  output:
    root: /scratch3/NCEPDEV/fv3-cam/Ting.Lei/tlei-anemoi-training/verify/

dataloader:
  limit_batches:
    training: 1
    validation: null
    test: null
  validation_rollout: 2
  grid_indices:
    datasets:
      data:
        _target_: anemoi.training.data.grid_indices.MaskedGrid
        nodes_name: ${graph.data}
        node_attribute_name: indices_connected_nodes
  training:
    datasets:
      data:
        dataset: ${system.input.dataset}
        start: "2024-05-05T00:00:00"
        end: "2024-05-05T23:00:00"
        frequency: ${data.frequency}
        drop: [boundary_mask]
  validation:
    datasets:
      data:
        dataset: ${system.input.dataset}
        start: "2024-05-05T00:00:00"
        end: "2024-05-05T23:00:00"
        frequency: ${data.frequency}
        drop: [boundary_mask]
  test:
    datasets:
      data:
        dataset: ${system.input.dataset}
        start: "2024-05-05T00:00:00"
        end: "2024-05-05T23:00:00"
        frequency: ${data.frequency}
        drop: [boundary_mask]

diagnostics:
  plot:
    asynchronous: false
    datashader: false
    datasets_to_plot: [data]
    frequency:
      batch: 100000
      epoch: 1
    sample_idx: 0
    parameters:
      - clmr_200
      - clmr_500
      - clmr_850
      - clmr_925
      - grle_200
      - grle_500
      - grle_850
      - grle_925
      - height_200
      - height_500
      - height_850
      - height_925
      - icmr_200
      - icmr_500
      - icmr_850
      - icmr_925
      - landcover
      - orography
      - pres_0g
      - refc
      - rwmr_200
      - rwmr_500
      - rwmr_850
      - rwmr_925
      - snmr_200
      - snmr_500
      - snmr_850
      - snmr_925
      - sphum_200
      - sphum_500
      - sphum_850
      - sphum_925
      - swdown
      - temp_200
      - temp_500
      - temp_850
      - temp_925
      - ugrd_200
      - ugrd_500
      - ugrd_850
      - ugrd_925
      - vgrd_200
      - vgrd_500
      - vgrd_850
      - vgrd_925
    precip_and_related_fields: []
    colormaps: {}
    callbacks:
      - _target_: anemoi.training.diagnostics.callbacks.plot.GraphTrainableFeaturesPlot
        every_n_epochs: 1
        dataset_names: [data]
      - _target_: anemoi.training.diagnostics.callbacks.plot.PlotLoss
        dataset_names: [data]
        parameter_groups: {}
      - _target_: anemoi.training.diagnostics.callbacks.plot.PlotSample
        sample_idx: ${diagnostics.plot.sample_idx}
        per_sample: 6
        parameters: ${diagnostics.plot.parameters}
        accumulation_levels_plot: []
        output_steps: ${training.rollout.max}
        precip_and_related_fields: ${diagnostics.plot.precip_and_related_fields}
        colormaps: ${diagnostics.plot.colormaps}
        dataset_names: [data]
      - _target_: anemoi.training.diagnostics.callbacks.plot.PlotSpectrum
        sample_idx: ${diagnostics.plot.sample_idx}
        parameters: ${diagnostics.plot.parameters}
        output_steps: ${training.rollout.max}
        dataset_names: [data]
      - _target_: anemoi.training.diagnostics.callbacks.plot.PlotHistogram
        sample_idx: ${diagnostics.plot.sample_idx}
        precip_and_related_fields: ${diagnostics.plot.precip_and_related_fields}
        parameters: ${diagnostics.plot.parameters}
        output_steps: ${training.rollout.max}
        dataset_names: [data]
      - _target_: anemoi.training.diagnostics.callbacks.plot.LongRolloutPlots
        rollout:
          - ${dataloader.validation_rollout}
        video_rollout: ${dataloader.validation_rollout}
        every_n_epochs: 1
        sample_idx: ${diagnostics.plot.sample_idx}
        parameters: ${diagnostics.plot.parameters}
        colormaps: ${diagnostics.plot.colormaps}
        dataset_names: [data]
  export_predictions:
    enabled: true
    format: netcdf
    every_n_batches: 1
    sample_idx: 0
    parameters:
      - clmr_200
      - clmr_500
      - clmr_850
      - clmr_925
      - grle_200
      - grle_500
      - grle_850
      - grle_925
      - height_200
      - height_500
      - height_850
      - height_925
      - icmr_200
      - icmr_500
      - icmr_850
      - icmr_925
      - landcover
      - orography
      - pres_0g
      - refc
      - rwmr_200
      - rwmr_500
      - rwmr_850
      - rwmr_925
      - snmr_200
      - snmr_500
      - snmr_850
      - snmr_925
      - sphum_200
      - sphum_500
      - sphum_850
      - sphum_925
      - swdown
      - temp_200
      - temp_500
      - temp_850
      - temp_925
      - ugrd_200
      - ugrd_500
      - ugrd_850
      - ugrd_925
      - vgrd_200
      - vgrd_500
      - vgrd_850
      - vgrd_925
    output_dir: ${system.output.root}/predictions
    start: ${dataloader.training.datasets.data.start}
    frequency: ${data.frequency}

training:
  multistep_input: 2
  rollout:
    start: 1
    epoch_increment: 0
    max: 2
  load_weights_only: True
  max_epochs: 1
  max_steps: 1
