# Anemoi-datasets recipe for RRFS GRIB2 using shortest-lead valid-time links.
# This creates the boundary/forcing dataset for LAM training.
#
# Target grid should be a larger lat/lon box than the core subdomain so
# that boundary nodes exist outside the core. Build a separate regrid matrix
# for that boundary grid (core extent + 20 km) and point to it below.

name: rrfs-boundary-3km-20km-202405-1h

description: >
  RRFS GRIB2 collapsed to a single valid-time axis using shortest lead
  forecasts (0-5h), regridded to the boundary (larger) lat/lon grid.
  One file per valid time. Boundary grid is core extent + 20 km.

dates:
  # One full month per run (example: May 2024).
  # Use a monthly output path, e.g. rrfs-boundary-3km-20km-202405.zarr
  start: "2024-05-01T00:00:00"
  end: "2024-05-31T23:00:00"
  frequency: 1h

build:
  variable_naming: "{param}"

input:
  pipe:
    - join:
        - pipe:
            - grib:
                path: /scratch3/NCEPDEV/fv3-cam/Ting.Lei/rrfs-valid/rrfs.v{date:strftime(%Y%m%d%H)}.grib2
                param:
                  - u
                  - v
                  - t
                  - q
                  - gh
                  - clwmr
                  - icmr
                  - rwmr
                  - snmr
                  - grle
                typeOfLevel: isobaricInhPa
                levelist: [925, 850, 500, 200]
            - rename:
                param:
                  u: ugrd
                  v: vgrd
                  t: temp
                  q: sphum
                  gh: height
                  clwmr: clmr
                  icmr: icmr
                  rwmr: rwmr
                  snmr: snmr
                  grle: grle
            - rename:
                param: "{param}_{level}"
        - pipe:
            - grib:
                path: /scratch3/NCEPDEV/fv3-cam/Ting.Lei/rrfs-valid/rrfs.v{date:strftime(%Y%m%d%H)}.grib2
                param: [sp, tmp]
                typeOfLevel: surface
            - rename:
                param:
                  sp: pres_0g
                  tmp: temp_sfc
        - pipe:
            - grib:
                path: /scratch3/NCEPDEV/fv3-cam/Ting.Lei/rrfs-valid/rrfs.v{date:strftime(%Y%m%d%H)}.grib2
                param: [refc]
    - regrid:
        matrix: /scratch3/NCEPDEV/fv3-cam/Ting.Lei/regrid/rrfs-to-latlon-3km-boundary-20km.npz

# output is provided on the command line as the second argument to
# `anemoi-datasets create`.
