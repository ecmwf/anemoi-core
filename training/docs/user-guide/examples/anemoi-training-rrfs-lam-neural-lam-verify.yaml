defaults:
  - data: zarr
  - dataloader: rrfs_native_no_frequency
  - diagnostics: evaluation
  - system: example
  - graph: existing_graph
  - model: graphtransformer
  - training: lam
  - override /diagnostics/plot: rollout_eval
  - _self_

config_validation: True

# Required inputs (override on CLI)
checkpoint_path: ???
sample:
  start: "2024-05-05T00:00:00"
  end: "2024-05-05T23:00:00"
  frequency: 1h

data:
  resolution: 3p0km
  frequency: 1h
  timestep: 1h
  forcing:
    - landcover
    - orography
    - swdown
  diagnostic: []
  normalizer:
    default: "mean-std"
    std: []
    min-max: []
    max: []
    none:
      - landcover
      - orography
      - icmr_850
      - icmr_925
      - snmr_850
      - snmr_925
      - refc

system:
  hardware:
    num_gpus_per_node: 1
    num_nodes: 1
    num_gpus_per_model: 1
  input:
    dataset: /scratch3/NCEPDEV/fv3-cam/Ting.Lei/dr-anemoi-core/anemoi-core/test-20km-bcmask-time-s.zarr
    graph: /scratch3/NCEPDEV/fv3-cam/Ting.Lei/tlei-anemoi-training/graphs/rrfs-3km-lam-graph-20km.pt
    warm_start: ${checkpoint_path}
  output:
    root: /scratch3/NCEPDEV/fv3-cam/Ting.Lei/tlei-anemoi-training/verify/

dataloader:
  limit_batches:
    training: 1
    validation: null
    test: null
  training:
    start: ${sample.start}
    end: ${sample.end}
    drop: [boundary_mask]
  validation:
    start: ${sample.start}
    end: ${sample.end}
    drop: [boundary_mask]
  test:
    start: ${sample.start}
    end: ${sample.end}
    drop: [boundary_mask]

diagnostics:
  plot:
    frequency:
      batch: 100000
      epoch: 1
    sample_idx: 0
    parameters:
      - height_500
      - temp_850
      - ugrd_850
      - vgrd_850
      - pres_0g
      - swdown
    precip_and_related_fields: []
    colormaps:
      precip:
        variables: []
  export_predictions:
    enabled: true
    format: netcdf
    every_n_batches: 1
    sample_idx: ${diagnostics.plot.sample_idx}
    parameters: ${diagnostics.plot.parameters}
    output_dir: ${system.output.root}/predictions
    start: ${sample.start}
    frequency: ${sample.frequency}

training:
  load_weights_only: True
  max_epochs: 1
  max_steps: 1
