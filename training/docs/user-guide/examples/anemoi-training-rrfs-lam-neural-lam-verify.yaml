defaults:
  - data: zarr
  - dataloader: native_grid
  - diagnostics: evaluation
  - system: example
  - graph: existing
  - model: graphtransformer
  - training: lam
  - override /diagnostics/plot: rollout_eval
  - _self_

config_validation: True

# Required inputs (override on CLI)
# system.input.warm_start
# dataloader.*.start / dataloader.*.end

data:
  resolution: 3p0km
  frequency: 1h
  timestep: 1h
  forcing:
    - landcover
    - orography
    - swdown
  diagnostic: []
  normalizer:
    default: "mean-std"
    std: []
    min-max: []
    max: []
    none:
      - landcover
      - orography
      - icmr_850
      - icmr_925
      - snmr_850
      - snmr_925
      - refc

system:
  hardware:
    num_gpus_per_node: 1
    num_nodes: 1
    num_gpus_per_model: 1
  input:
    dataset: /scratch3/NCEPDEV/fv3-cam/Ting.Lei/dr-anemoi-core/anemoi-core/test-20km-bcmask-time-s.zarr
    graph: /scratch3/NCEPDEV/fv3-cam/Ting.Lei/tlei-anemoi-training/graphs/rrfs-3km-lam-graph-20km_data.pt
    warm_start: ???
  output:
    root: /scratch3/NCEPDEV/fv3-cam/Ting.Lei/tlei-anemoi-training/verify/

dataloader:
  limit_batches:
    training: 1
    validation: null
    test: null
  grid_indices:
    datasets:
      data:
        _target_: anemoi.training.data.grid_indices.FullGrid
        nodes_name: ${graph.data}
  training:
    datasets:
      data:
        dataset: ${system.input.dataset}
        start: "2024-05-05T00:00:00"
        end: "2024-05-05T23:00:00"
        frequency: ${data.frequency}
        drop: [boundary_mask]
  validation:
    datasets:
      data:
        dataset: ${system.input.dataset}
        start: "2024-05-05T00:00:00"
        end: "2024-05-05T23:00:00"
        frequency: ${data.frequency}
        drop: [boundary_mask]
  test:
    datasets:
      data:
        dataset: ${system.input.dataset}
        start: "2024-05-05T00:00:00"
        end: "2024-05-05T23:00:00"
        frequency: ${data.frequency}
        drop: [boundary_mask]

diagnostics:
  plot:
    callbacks:
      - _target_: anemoi.training.diagnostics.callbacks.plot.PlotSample
        dataset_names: [data]
        sample_idx: ${diagnostics.plot.sample_idx}
        per_sample: 6
        parameters: ${diagnostics.plot.parameters}
        accumulation_levels_plot: [0, 0.05, 0.1, 0.25, 0.5, 1, 1.5, 2, 3, 4, 5, 6, 7, 100]
        precip_and_related_fields: ${diagnostics.plot.precip_and_related_fields}
        colormaps: ${diagnostics.plot.colormaps}
    frequency:
      batch: 100000
      epoch: 1
    sample_idx: 0
    parameters:
      - height_500
      - temp_850
      - ugrd_850
      - vgrd_850
      - pres_0g
      - swdown
    precip_and_related_fields: []
    colormaps:
      precip:
        variables: []
  export_predictions:
    enabled: true
    format: netcdf
    every_n_batches: 1
    sample_idx: ${diagnostics.plot.sample_idx}
    parameters: ${diagnostics.plot.parameters}
    output_dir: ${system.output.root}/predictions
    start: ${dataloader.training.datasets.data.start}
    frequency: ${data.frequency}

training:
  load_weights_only: True
  max_epochs: 1
  max_steps: 1
