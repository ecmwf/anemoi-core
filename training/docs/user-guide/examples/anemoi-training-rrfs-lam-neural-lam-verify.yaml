defaults:
  - data: zarr
  - dataloader: native_grid
  - diagnostics: evaluation
  - system: example
  - graph: existing
  - model: graphtransformer
  - training: lam
  - override /diagnostics/plot: rollout_eval
  - _self_

config_validation: True

# Required inputs (override on CLI)
# system.input.warm_start
# dataloader.*.start / dataloader.*.end

data:
  resolution: 3p0km
  frequency: 1h
  timestep: 1h
  datasets:
    data:
      forcing:
        - landcover
        - orography
        - swdown
      diagnostic: []
      processors:
        normalizer:
          config:
            default: "mean-std"
            std: []
            min-max: []
            max: []
            none:
              - landcover
              - orography
              - swdown
              - icmr_850
              - icmr_925
              - snmr_850
              - snmr_925
              - refc

system:
  hardware:
    num_gpus_per_node: 1
    num_nodes: 1
    num_gpus_per_model: 1
  input:
    dataset: /scratch3/NCEPDEV/fv3-cam/Ting.Lei/dr-anemoi-core/anemoi-core/test-20km-bcmask-time-s.zarr
    # Base graph filename; training will append _{dataset_name}.pt automatically.
    graph: /scratch3/NCEPDEV/fv3-cam/Ting.Lei/tlei-anemoi-training/graphs/rrfs-3km-lam-graph-20km.pt
    warm_start: ???
  output:
    root: /scratch3/NCEPDEV/fv3-cam/Ting.Lei/tlei-anemoi-training/verify/

dataloader:
  limit_batches:
    training: 1
    validation: null
    test: null
  grid_indices:
    datasets:
      data:
        _target_: anemoi.training.data.grid_indices.FullGrid
        nodes_name: ${graph.data}
  training:
    datasets:
      data:
        dataset: ${system.input.dataset}
        start: "2024-05-05T00:00:00"
        end: "2024-05-05T23:00:00"
        frequency: ${data.frequency}
        drop: [boundary_mask]
  validation:
    datasets:
      data:
        dataset: ${system.input.dataset}
        start: "2024-05-05T00:00:00"
        end: "2024-05-05T23:00:00"
        frequency: ${data.frequency}
        drop: [boundary_mask]
  test:
    datasets:
      data:
        dataset: ${system.input.dataset}
        start: "2024-05-05T00:00:00"
        end: "2024-05-05T23:00:00"
        frequency: ${data.frequency}
        drop: [boundary_mask]

diagnostics:
  plot: null
  export_predictions:
    enabled: true
    format: netcdf
    every_n_batches: 1
    sample_idx: 0
    parameters:
      - height_500
      - temp_850
      - ugrd_850
      - vgrd_850
      - pres_0g
      - swdown
    output_dir: ${system.output.root}/predictions
    start: ${dataloader.training.datasets.data.start}
    frequency: ${data.frequency}

training:
  load_weights_only: True
  max_epochs: 1
  max_steps: 1
