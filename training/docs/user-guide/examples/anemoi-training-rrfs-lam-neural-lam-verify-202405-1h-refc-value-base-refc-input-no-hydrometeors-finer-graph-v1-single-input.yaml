defaults:
  - anemoi-training-rrfs-lam-neural-lam-verify-202405-1h-refc-value-loss-no-refc-input-finer-graph-v1
  - _self_

config_validation: True

# Verification variant for checkpoints trained with:
#   anemoi-training-rrfs-lam-neural-lam-static-forcing-202405-1h-refc-value-base-refc-input-no-hydrometeors-finer-graph-v1-single-input
#
# This matches the base GraphTransformer layout:
#   - refc is part of the prognostic/input state
#   - multistep_input = 1
#   - hydrometeors removed entirely
#   - results stored under the same experiment root

data:
  datasets:
    data:
      diagnostic: []
      processors:
        normalizer:
          config:
            default: "mean-std"
            std: []
            min-max:
              - refc
            max: []
            none:
              - landcover
              - orography

system:
  output:
    root: /scratch3/NCEPDEV/fv3-cam/Ting.Lei/tlei-anemoi-training/base_graphtransformer_finer_graph_v1_single_input_refc_input_no_hydrometeors/verify/

