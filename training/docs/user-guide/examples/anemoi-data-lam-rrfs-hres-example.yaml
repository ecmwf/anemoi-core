# Anemoi-datasets recipe for RRFS GRIB2 using shortest-lead valid-time links.
# This expects preprocessed symlinks like:
#   /scratch3/NCEPDEV/fv3-cam/Ting.Lei/rrfs-valid/rrfs.vYYYYMMDDHH.grib2
# created from the shortest lead (0-5h) of each cycle.

name: rrfs-conus-3km-20240505-20240512-1h

description: >
  RRFS CONUS GRIB2 collapsed to a single valid-time axis using shortest lead
  forecasts (0-5h). One file per valid time.

dates:
  start: "2024-05-05T00:00:00"
  end: "2024-05-12T23:00:00"
  frequency: 1h

input:
  pipe:
    - join:
        - grib:
            path: /scratch3/NCEPDEV/fv3-cam/Ting.Lei/rrfs-valid/rrfs.v{date:strftime(%Y%m%d%H)}.grib2
            param:
              - REFC
              - pres_0g
              - height_500hPa
              - ugrd_925
              - ugrd_850
              - ugrd_500
              - ugrd_200
              - vgrd_925
              - vgrd_850
              - vgrd_500
              - vgrd_200
              - temp_925
              - temp_850
              - temp_500
              - temp_200
              - sphum_925
              - sphum_850
              - sphum_500
              - sphum_200
              - clmr_925
              - clmr_850
              - clmr_500
              - clmr_200
              - icmr_925
              - icmr_850
              - icmr_500
              - icmr_200
              - rwmr_925
              - rwmr_850
              - rwmr_500
              - rwmr_200
              - snmr_925
              - snmr_850
              - snmr_500
              - snmr_200
              - grle_925
              - grle_850
              - grle_500
              - grle_200
              - temp_sfc
              - tcdc
    - regrid:
        matrix: /scratch3/NCEPDEV/fv3-cam/Ting.Lei/regrid/rrfs-to-latlon-3km.npz

# output is provided on the command line as the second argument to
# `anemoi-datasets create`.
