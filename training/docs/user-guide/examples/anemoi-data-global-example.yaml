# Example Hydra configuration for creating a global dataset
# with `anemoi-data create`. Replace `???` placeholders with paths that point
# to the source data in your environment.

dataset:
  name: global-0p25-2018-2020-6h
  description: >
    Example global ERA5-style dataset at 0.25° resolution sampled every
    6 hours. Suitable as a baseline configuration for training global
    AI weather models with Anemoi.
  frequency: 6h
  timestep: 6h

  domain:
    grid: latlon
    lat:
      min: -90.0
      max: 90.0
    lon:
      min: 0.0
      max: 360.0

time:
  coverage:
    start: "2018-01-01T00:00:00"
    end: "2020-12-31T18:00:00"
  splits:
    train:
      start: "2018-01-01T00:00:00"
      end: "2019-12-31T18:00:00"
    validation:
      start: "2020-01-01T00:00:00"
      end: "2020-06-30T18:00:00"
    test:
      start: "2020-07-01T00:00:00"
      end: "2020-12-31T18:00:00"

storage:
  path: ${oc.env:ANEMOI_DATA_ROOT,./data}/${dataset.name}.zarr
  chunking:
    time: 8
    node: 8192
    variable: 16
  compressor:
    cname: zstd
    clevel: 6
    shuffle: bitshuffle

sources:
  global_core:
    kind: zarr
    dataset: ???                        # Path/URL to the full global reanalysis (e.g. ERA5)
    variables:
      state:
        - "t"
        - "u"
        - "v"
        - "q"
      surface:
        - "2t"
        - "10u"
        - "10v"
        - "msl"
      diagnostics:
        - "tp"
    grid:
      projection: latlon
      resolution_deg: 0.25

recipe:
  cutout:
    - dataset: ${sources.global_core.dataset}
      role: core
  adjust: calendar
  min_distance_km: 0

features:
  forcing:
    - "cos_latitude"
    - "cos_longitude"
    - "sin_latitude"
    - "sin_longitude"
    - "cos_julian_day"
    - "sin_julian_day"
    - "lsm"
    - "z"
    - "insolation"
  diagnostics:
    - "tp"
    - "cp"

normalizer:
  default: mean-std
  std:
    - "tp"
    - "cp"
  none:
    - "cos_latitude"
    - "cos_longitude"
    - "sin_latitude"
    - "sin_longitude"
    - "cos_julian_day"
    - "sin_julian_day"
    - "lsm"
    - "z"
    - "insolation"

outputs:
  metadata:
    created_by: anemoi-data example
    notes:
      - "Single-source global dataset—no boundary mask generated."
