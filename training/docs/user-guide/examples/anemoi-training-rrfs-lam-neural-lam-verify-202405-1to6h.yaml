defaults:
  - anemoi-training-rrfs-lam-neural-lam-verify-202405-1to3h
  - _self_

config_validation: True

# Verification variant for checkpoints trained with multistep_output=3.
# This runs two rollout steps, so validation covers +1h through +6h:
# - rstep00 out00/out01/out02 -> +1h/+2h/+3h
# - rstep01 out00/out01/out02 -> +4h/+5h/+6h

dataloader:
  validation_rollout: 2

training:
  rollout:
    start: 2
    epoch_increment: 0
    max: 2

diagnostics:
  plot:
    diagnostic_input_reference_fields: [refc]
    callbacks:
      - _target_: anemoi.training.diagnostics.callbacks.plot.PlotSample
        sample_idx: 0
        parameters: ${diagnostics.plot.parameters}
        per_sample: 6
        accumulation_levels_plot: [0.01]
        output_steps: ${training.multistep_output}
        precip_and_related_fields: ${diagnostics.plot.precip_and_related_fields}
        diagnostic_input_reference_fields: ${diagnostics.plot.diagnostic_input_reference_fields}
        colormaps: ${diagnostics.plot.colormaps}
        every_n_batches: 1
        dataset_names: ${diagnostics.plot.datasets_to_plot}
      - _target_: anemoi.training.diagnostics.callbacks.plot.PlotSample
        sample_idx: 6
        parameters: ${diagnostics.plot.parameters}
        per_sample: 6
        accumulation_levels_plot: [0.01]
        output_steps: ${training.multistep_output}
        precip_and_related_fields: ${diagnostics.plot.precip_and_related_fields}
        diagnostic_input_reference_fields: ${diagnostics.plot.diagnostic_input_reference_fields}
        colormaps: ${diagnostics.plot.colormaps}
        every_n_batches: 1
        dataset_names: ${diagnostics.plot.datasets_to_plot}
      - _target_: anemoi.training.diagnostics.callbacks.plot.PlotSample
        sample_idx: 12
        parameters: ${diagnostics.plot.parameters}
        per_sample: 6
        accumulation_levels_plot: [0.01]
        output_steps: ${training.multistep_output}
        precip_and_related_fields: ${diagnostics.plot.precip_and_related_fields}
        diagnostic_input_reference_fields: ${diagnostics.plot.diagnostic_input_reference_fields}
        colormaps: ${diagnostics.plot.colormaps}
        every_n_batches: 1
        dataset_names: ${diagnostics.plot.datasets_to_plot}
