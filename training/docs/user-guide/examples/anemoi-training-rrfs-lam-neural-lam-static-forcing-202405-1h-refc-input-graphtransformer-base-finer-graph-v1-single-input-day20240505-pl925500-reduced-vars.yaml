defaults:
  - anemoi-training-rrfs-lam-neural-lam-static-forcing-202405-1h-refc-input-graphtransformer-finer-graph-v1-single-input-day20240505-pl925500-reduced-vars
  - _self_

# One-day, single-input, finer-graph GraphTransformer experiment with the same
# reduced variable set as the existing day20240505 run, but using the lighter
# "base" refc loss weighting:
#   - general_variable.weights.refc = 20
#   - refc_range_weight_factors = [1, 2, 2, 4]

system:
  output:
    root: /scratch3/NCEPDEV/fv3-cam/Ting.Lei/tlei-anemoi-training/base_graphtransformer_finer_graph_v1_single_input_day20240505_refc_input_pl925500_reduced_vars/

training:
  training_loss:
    datasets:
      data:
        scalers: ['pressure_level', 'general_variable', 'node_weights', 'time_steps', 'refc_range_weight_factors']
  scalers:
    datasets:
      data:
        general_variable:
          weights:
            default: 1
            sphum: 0.6
            temp: 6
            ugrd: 5
            vgrd: 5
            height: 12
            pres_0g: 10
            refc: 20
            clmr: 1
            icmr: 1
            rwmr: 1
            snmr: 1
            grle: 1
        refc_range_weight_factors:
          _target_: anemoi.training.losses.scalers.TargetValueRangeScaler
          variable: refc
          normalization: min-max
          thresholds: [0.0, 20.0, 40.0]
          range_weight_factors: [1, 2, 2, 4]
