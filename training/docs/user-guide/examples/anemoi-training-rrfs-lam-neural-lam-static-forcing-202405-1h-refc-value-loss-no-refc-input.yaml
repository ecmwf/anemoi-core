# Variant of the refc-value/no-refc-input training setup for a direct 1-hour
# prediction only. This keeps the same data, model, loss, and no-refc-input
# role split, but trains only the +1h target instead of the +1h/+2h/+3h
# multi-output target.

training:
  multistep_output: 1
  rollout:
    start: 1
    epoch_increment: 0
    max: 1
