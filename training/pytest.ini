[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
markers =
    data_dependent: marks tests depending on data (deselect with '-m "not data_dependent"')
    auth: marks tests that require authentication (deselect with '-m "not auth"')
    gpu: marks tests that require a GPU (deselect with '-m "not gpu"')
    multigpu: marks tests that require multiple GPUs (use --multigpu to enable)
    mlflow: marks tests that require an MLFlow server (use --mlflow to enable)
    slow: mark test as slow (skipped unless --slow is used)
    asyncio: marks tests as async tests


tmp_path_retention_policy = none
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s %(levelname)s %(message)s
filterwarnings =
  ignore::marshmallow.warnings.ChangedInMarshmallow4Warning
  ignore::marshmallow.warnings.RemovedInMarshmallow4Warning
  ignore::pydantic.warnings.PydanticDeprecatedSince20
