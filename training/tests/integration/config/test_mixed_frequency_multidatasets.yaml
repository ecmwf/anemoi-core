# Mixed-frequency integration config used by metadata-oriented tests.
#
# This file is test-only. It uses `task.timestep` as the shared model cadence
# together with per-dataset native reader frequencies. The datamodule should
# derive each dataset's exact input/target windows automatically from that
# shared task window plus the native dataset cadence.

data:
  frequency: "5m"
  datasets:
    meps:
      forcing: ["forcing_var"]
      diagnostic: []
      target: []
    nordic_radar:
      forcing: ["forcing_var"]
      diagnostic: []
      target: []

task:
  _target_: anemoi.training.tasks.Forecaster
  multistep_input: 1
  multistep_output: 1
  # Shared model cadence. Each dataset below still keeps its own native frequency.
  timestep: "5m"
  rollout:
    # fixed 3-step rollout window for this mixed-frequency metadata test
    start: 3
    epoch_increment: 0
    maximum: 3
  validation_rollout: 1

dataloader:
  pin_memory: false
  prefetch_factor: 2
  num_workers:
    training: 0
    validation: 0
    test: 0
  batch_size:
    training: 1
    validation: 1
    test: 1
  training:
    datasets:
      meps:
        dataset_config:
          dataset: meps_source
          frequency: "1h"
        start: 2020-01-01 00:00:00
        end: 2020-01-02 00:00:00
      nordic_radar:
        dataset_config:
          dataset: radar_source
          frequency: "5m"
        start: 2020-01-01 00:00:00
        end: 2020-01-02 00:00:00
  validation:
    datasets: {}
  test:
    datasets: {}

training: {}
