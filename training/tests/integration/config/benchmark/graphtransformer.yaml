# configuration for the "graphtransformer" benchmark
system:
  hardware:
    num_gpus_per_model:  ${oc.env:GPM}
    num_gpus_per_node:  ${oc.env:GPM}
  input:
    #dataset: /e/data1/jureap-data/ecmwf/users/obrien2/rechunked-datasets/aifs-ea-an-oper-0001-mars-n320-1979-2023-6h-v8-4gridchunks.zarr
    dataset: ${oc.env:DATASET}
    graph: ./graphtransformer-bm-graph.pt
    #store locally so graph will be reused by non-zero processes

dataloader:
  training:
    datasets:
      data:
        end: 2020-11-30
  validation:
    datasets:
      data:
        start: 2020-12-31

model:
  num_channels: 512

graph:
  nodes:
    hidden:
      node_builder:
        resolution: 6
