# configuration for the "edm_diffusion_tendency" benchmark
system:
  hardware:
    num_gpus_per_ensemble: 2
    num_gpus_per_model: 1
  input:
    dataset: ??? # dataset still being built
    graph: ./edm_diffusion_tendency-bm-graph.pt
    #store locally so graph will be reused by non-zero processes

dataloader:
  num_workers:
    training: 8
    validation: 8
  training:
    datasets:
      data:
        end: 2020-11-30
  validation:
    datasets:
      data:
        start: 2020-12-31

model:
  num_channels: 512

graph:
  nodes:
    hidden:
      node_builder:
        resolution: 6

# Disable plots for the benchmark run
diagnostics:
  plot:
    callbacks: []
