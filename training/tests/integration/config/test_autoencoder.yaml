# Modifications for the basic template "config.yaml"
system:
  input:
    dataset: anemoi-integration-tests/training/datasets/aifs-ea-an-oper-0001-mars-o96-2017-2017-6h-v8-testing.zarr

dataloader:
  training:
    datasets:
      data:
        end: 2017-01-08 12:00:00
  validation:
    datasets:
      data:
        start: 2017-01-08 18:00:00


diagnostics:
  log:
    mlflow:
      authentication: True
      experiment_name: 'ci_hpc_mlflow'
  # autoencoder so far do not hanlde most of the plotting callbcaks

  plot:
    focus_areas:
      europe:
        latlon_bbox: [30.0, -20.0, 60.0, 40.0]
    asynchronous: False # Whether to plot asynchronously
    callbacks:
      # Add plot callbacks here
      - _target_: anemoi.training.diagnostics.callbacks.plot.GraphFeaturePlot
        every_n_epochs: 5
        dataset_names: ["data"]
      - _target_: anemoi.training.diagnostics.callbacks.plot.LossCurvePlot
        # group parameters by categories when visualizing contributions to the loss
        # one-parameter groups are possible to highlight individual parameters
        dataset_names: ["data"]
        parameter_groups:
          moisture: [tp, cp]
        every_n_batches: ${diagnostics.plot.frequency.batch}
      - _target_: anemoi.training.diagnostics.callbacks.plot.SpatialMapPlot
        tag_infix: sample
        dataset_names: ["data"]
        sample_idx: ${diagnostics.plot.sample_idx}
        parameters: ${diagnostics.plot.parameters}
        every_n_batches: ${diagnostics.plot.frequency.batch}
        focus_area: ${diagnostics.plot.focus_areas.europe}
        with_auxiliary: true
        plot_fn:
          _target_: anemoi.training.diagnostics.evaluation.plotting.spatial_map.sample_plot_fn
          _partial_: true
          per_sample: 6
          accumulation_levels_plot: [0, 0.05, 0.1, 0.25, 0.5, 1, 1.5, 2, 3, 4, 5, 6, 7, 100]
      - _target_: anemoi.training.diagnostics.callbacks.plot.SpatialMapPlot
        tag_infix: histogram
        dataset_names: ["data"]
        sample_idx: ${diagnostics.plot.sample_idx}
        every_n_batches: ${diagnostics.plot.frequency.batch}
        parameters:
        - z_500
        - tp
        plot_fn:
          _target_: anemoi.training.diagnostics.evaluation.plotting.spatial_map.histogram_plot_fn
          _partial_: true
