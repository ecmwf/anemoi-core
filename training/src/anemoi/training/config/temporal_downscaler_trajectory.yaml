defaults:
- data: zarr
- dataloader: trajectory_native_grid
- diagnostics: evaluation
- system: example
- graph: multi_scale
- model: graphtransformer
- task: temporal_downscaler
- training: single
- override training/training_loss: single_MSE_aggregation
- _self_

config_validation: True

### This file is for local experimentation.
##  When you commit your changes, assign the new features and keywords
##  to the correct defaults.
# For example to change from default GPU count:
# system:
#   hardware:
#     num_gpus_per_node: 1

# ============
# Temporal interpolation (downscaling) trained on a 5-D trajectory dataset.
#
# The TrajectoryDataset reader (selected by `dataloader: trajectory_native_grid`)
# exposes each forecast initialisation as an independent sequence with the
# lead-step as the time axis, so interpolation windows are drawn *within* a
# single forecast and never cross initialisation boundaries.
#
# The task interpolates between input steps 6h apart at 1h resolution
# (task/temporal_downscaler.yaml: input_timestep 6H, output_timestep 1H), so
# the trajectory dataset must have a 1h step frequency.
# ============

# The TrajectoryDataset reader uses the dataset's own step frequency. The
# analysis `frequency` requested from open_dataset is not used on the trajectory
# path; it is set to the step frequency (1h) so it matches the task resolution.
data:
  frequency: 1h

system:
  input:
    # A 5-D `trajectories`-layout zarr (base_dates, variables, ensembles, steps, cells)
    dataset: aifs-ea-an-oper-0001-mars-o96-1979-2024-1h-v3-forecast-5d.zarr
    graph: graph_anemoi_new.pt
    loss_matrices_path: null
  hardware:
    accelerator: auto
    num_gpus_per_node: 1
    num_nodes: 1
    num_gpus_per_model: 1

diagnostics:
  plot:
    callbacks: []
  callbacks:
    - _target_: anemoi.training.diagnostics.callbacks.per_timestep_metrics.PerTimestepMetrics
      every_n_batches: 20
