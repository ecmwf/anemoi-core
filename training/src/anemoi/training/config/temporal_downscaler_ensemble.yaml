defaults:
- data: zarr
- dataloader: native_grid
- diagnostics: evaluation_ens
- system: example
- graph: multi_scale
- model: graphtransformer_ens
- task: temporal_downscaler
- training: ensemble
- _self_

config_validation: True

### This file is for local experimentation.
##  When you commit your changes, assign the new features and keywords
##  to the correct defaults.
# For example to change from default GPU count:
# system:
#   hardware:
#     num_gpus_per_node: 1

diagnostics:
  plot:
    callbacks: []
  callbacks: []

system:
  input:
    graph: graph_anemoi_new.pt
    dataset: aifs-ea-an-oper-0001-mars-o96-1979-2024-1h-v3-with-era51
    loss_matrices_path: null
  hardware:
    accelerator: auto
    num_gpus_per_ensemble: 1
    num_gpus_per_node: 1
    num_nodes: 1
    num_gpus_per_model: 1

model:
  num_channels: 128

training:
  ensemble_size_per_device: 2
  training_loss:
    datasets:
      data:
        _target_: anemoi.training.losses.combined.CombinedLoss
        loss_weights: [1.0, 0.5]
        scalers: []
        losses:
          - _target_: anemoi.training.losses.MultiscaleLossWrapper
            loss_matrices_path: ${system.input.loss_matrices_path}
            loss_matrices: [null]
            weights: [1.0]
            keep_batch_sharded: ${model.keep_batch_sharded}
            per_scale_loss:
              _target_: anemoi.training.losses.kcrps.AlmostFairKernelCRPS
              scalers: ['pressure_level', 'general_variable', 'nan_mask_weights', 'node_weights', 'time_steps']
              ignore_nans: False
              no_autocast: True
              alpha: 0.95
          - _target_: anemoi.training.losses.TimeAggregateLossWrapper
            time_aggregation_types: [mean, diff]
            scalers: []
            loss_fn:
              _target_: anemoi.training.losses.kcrps.AlmostFairKernelCRPS
              scalers: ['pressure_level', 'general_variable', 'nan_mask_weights', 'node_weights', 'time_steps']
              ignore_nans: False
              no_autocast: True
              alpha: 0.95
