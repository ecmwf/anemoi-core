prefetch_factor: 2
pin_memory: True

read_group_size: ${system.hardware.num_gpus_per_model}

num_workers:
  training: 4
  validation: 4
  test: 4
batch_size:
  training: 1
  validation: 1
  test: 1

limit_batches:
  training: null
  validation: null
  test: 20

grid_indices:
  datasets:
    in_lres:
      _target_: anemoi.training.data.grid_indices.FullGrid
      nodes_name: "data"
    in_hres:
      _target_: anemoi.training.data.grid_indices.FullGrid
      nodes_name: "data"
    out_hres:
      _target_: anemoi.training.data.grid_indices.FullGrid
      nodes_name: "data"

steps: [0, 24]
training_date: 2021
valid_date: 2022
test_date: 2023

training:
  start: 1900
  end: 1900-10-31
  datasets:
    in_lres:
      dataset: ${system.input.dataset_in_lres}
      start: ${dataloader.training.start}
      end: ${dataloader.training.end}
      frequency: ${data.frequency}
      drop: []
      select: [2t, 10u, 10v, msl]
    in_hres:
      dataset: ${system.input.dataset_in_hres}
      start: ${dataloader.training.start}
      end: ${dataloader.training.end}
      frequency: ${data.frequency}
      drop: []
      select: [2t, 10u, 10v, msl]
    out_hres:
      dataset: ${system.input.dataset_out_hres}
      start: ${dataloader.training.start}
      end: ${dataloader.training.end}
      frequency: ${data.frequency}
      drop: []
      select: [2t, 10u, 10v, msl]

validation_rollout: 0

validation:
  start: 1900-11-01
  end: 1900-12-31
  datasets:
    in_lres:
      dataset: ${system.input.dataset_in_lres}
      start: ${dataloader.validation.start}
      end: ${dataloader.validation.end}
      frequency: ${data.frequency}
      drop: []
      select: [2t, 10u, 10v, msl]
    in_hres:
      dataset: ${system.input.dataset_in_hres}
      start: ${dataloader.validation.start}
      end: ${dataloader.validation.end}
      frequency: ${data.frequency}
      drop: []
      select: [2t, 10u, 10v, msl]
    out_hres:
      dataset: ${system.input.dataset_out_hres}
      start: ${dataloader.validation.start}
      end: ${dataloader.validation.end}
      frequency: ${data.frequency}
      drop: []
      select: [2t, 10u, 10v, msl]

test:
  start: 1901
  end: 1901
  datasets:
    in_lres:
      dataset: ${system.input.dataset_in_lres}
      start: ${dataloader.test.start}
      end: ${dataloader.test.end}
      frequency: ${data.frequency}
      drop: []
      select: [2t, 10u, 10v, msl]
    in_hres:
      dataset: ${system.input.dataset_in_hres}
      start: ${dataloader.test.start}
      end: ${dataloader.test.end}
      frequency: ${data.frequency}
      drop: []
      select: [2t, 10u, 10v, msl]
    out_hres:
      dataset: ${system.input.dataset_out_hres}
      start: ${dataloader.test.start}
      end: ${dataloader.test.end}
      frequency: ${data.frequency}
      drop: []
      select: [2t, 10u, 10v, msl]
