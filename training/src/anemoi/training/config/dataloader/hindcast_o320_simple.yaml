prefetch_factor: 2
pin_memory: True

read_group_size: ${system.hardware.num_gpus_per_model}

num_workers:
  training: 4
  validation: 4
  test: 4
batch_size:
  training: 1
  validation: 1
  test: 1

limit_batches:
  training: null
  validation: null
  test: 20

grid_indices:
  datasets:
    in_lres:
      _target_: anemoi.training.data.grid_indices.FullGrid
      nodes_name: "data"
    in_hres:
      _target_: anemoi.training.data.grid_indices.FullGrid
      nodes_name: "data"
    out_hres:
      _target_: anemoi.training.data.grid_indices.FullGrid
      nodes_name: "data"

steps: [0, 12, 24, 36, 48, 60, 72]
training_date: 2021
valid_date: 2022
test_date: 2023

training:
  start: 1900
  end: 1908
  datasets:
    in_lres:
      dataset: ${system.input.dataset_in_lres}
      start: ${dataloader.training.start}
      end: ${dataloader.training.end}
      frequency: ${data.frequency}
      drop: []
    in_hres:
      dataset: ${system.input.dataset_in_hres}
      start: ${dataloader.training.start}
      end: ${dataloader.training.end}
      frequency: ${data.frequency}
      drop: []
    out_hres:
      dataset: ${system.input.dataset_out_hres}
      start: ${dataloader.training.start}
      end: ${dataloader.training.end}
      frequency: ${data.frequency}
      drop: []

validation_rollout: 0

validation:
  start: 1909
  end: 1909
  datasets:
    in_lres:
      dataset: ${system.input.dataset_in_lres}
      start: ${dataloader.validation.start}
      end: ${dataloader.validation.end}
      frequency: ${data.frequency}
      drop: []
    in_hres:
      dataset: ${system.input.dataset_in_hres}
      start: ${dataloader.validation.start}
      end: ${dataloader.validation.end}
      frequency: ${data.frequency}
      drop: []
    out_hres:
      dataset: ${system.input.dataset_out_hres}
      start: ${dataloader.validation.start}
      end: ${dataloader.validation.end}
      frequency: ${data.frequency}
      drop: []

test:
  start: 1910
  end: 1910
  datasets:
    in_lres:
      dataset: ${system.input.dataset_in_lres}
      start: ${dataloader.test.start}
      end: ${dataloader.test.end}
      frequency: ${data.frequency}
      drop: []
    in_hres:
      dataset: ${system.input.dataset_in_hres}
      start: ${dataloader.test.start}
      end: ${dataloader.test.end}
      frequency: ${data.frequency}
      drop: []
    out_hres:
      dataset: ${system.input.dataset_out_hres}
      start: ${dataloader.test.start}
      end: ${dataloader.test.end}
      frequency: ${data.frequency}
      drop: []
