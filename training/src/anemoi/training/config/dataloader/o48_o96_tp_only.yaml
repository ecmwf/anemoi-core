prefetch_factor: 2
pin_memory: True
read_group_size: ${system.hardware.num_gpus_per_model}

num_workers:
  training: 4
  validation: 4
  test: 1
batch_size:
  training: 1
  validation: 1
  test: 1

limit_batches:
  training: null
  validation: null
  test: 20

grid_indices:
  datasets:
    in_lres:
      _target_: anemoi.training.data.grid_indices.FullGrid
      nodes_name: "data"
    in_hres:
      _target_: anemoi.training.data.grid_indices.FullGrid
      nodes_name: "data"
    out_hres:
      _target_: anemoi.training.data.grid_indices.FullGrid
      nodes_name: "data"

# ============
# tp-only-target variant of o48_o96.yaml (halo).
# Mirror of DS dataloader/o48_o96_tp_only.yaml:
#   Input (lres): 78 vars = original 79 minus tp.
#   Forcings (hres): unchanged (10 select_forcings).
#   Output (out_hres): tp only.
# Combine with data.datasets.out_hres.direct_prediction=[tp] so tp is the
# sole direct-prediction target and no residual prediction applies.
# ============

steps: [6, 12, 18, 24, 30, 36, 42, 48, 54, 60, 66, 72]
training_date: "2024-10"
valid_date: "2024-11"

select_forcings:
  [
    cos_julian_day,
    cos_latitude,
    cos_local_time,
    cos_longitude,
    lsm,
    sin_julian_day,
    sin_latitude,
    sin_local_time,
    sin_longitude,
    z,
  ]

# 78 variables = original o48_o96 select_matched minus tp.
select_matched_input:
  [
    10u, 10v, 2d, 2t,
    cos_julian_day, cos_latitude, cos_local_time, cos_longitude,
    cos_solar_zenith_angle,
    lsm, msl,
    q_100, q_1000, q_200, q_300, q_400, q_50, q_500, q_700, q_850, q_925,
    sin_julian_day, sin_latitude, sin_local_time, sin_longitude,
    skt,
    t_100, t_1000, t_200, t_300, t_400, t_50, t_500, t_700, t_850, t_925,
    tcw,
    u_100, u_1000, u_200, u_300, u_400, u_50, u_500, u_700, u_850, u_925,
    v_100, v_1000, v_200, v_300, v_400, v_50, v_500, v_700, v_850, v_925,
    w_100, w_1000, w_200, w_300, w_400, w_50, w_500, w_700, w_850, w_925,
    z,
    z_100, z_1000, z_200, z_300, z_400, z_50, z_500, z_700, z_850, z_925,
  ]

select_matched_output:
  - tp

training:
  start: 1900
  end: 1901
  datasets:
    in_lres:
      dataset: ${system.input.dataset_in_lres}
      start: ${dataloader.training.start}
      end: ${dataloader.training.end}
      frequency: ${data.frequency}
      drop: []
      select: ${dataloader.select_matched_input}
      fake_forecasts:
        end: ${dataloader.training_date}
        steps: ${dataloader.steps}
    in_hres:
      dataset: ${system.input.dataset_in_hres}
      start: ${dataloader.training.start}
      end: ${dataloader.training.end}
      frequency: ${data.frequency}
      drop: []
      select: ${dataloader.select_forcings}
      fake_forecasts:
        end: ${dataloader.training_date}
        steps: ${dataloader.steps}
    out_hres:
      dataset: ${system.input.dataset_out_hres}
      start: ${dataloader.training.start}
      end: ${dataloader.training.end}
      frequency: ${data.frequency}
      drop: []
      select: ${dataloader.select_matched_output}
      fake_forecasts:
        end: ${dataloader.training_date}
        steps: ${dataloader.steps}

validation_rollout: 0

validation:
  start: 1900
  end: 1901
  datasets:
    in_lres:
      dataset: ${system.input.dataset_in_lres}
      start: ${dataloader.validation.start}
      end: ${dataloader.validation.end}
      frequency: ${data.frequency}
      drop: []
      select: ${dataloader.select_matched_input}
      fake_forecasts:
        start: ${dataloader.valid_date}
        end: ${dataloader.valid_date}
        steps: ${dataloader.steps}
    in_hres:
      dataset: ${system.input.dataset_in_hres}
      start: ${dataloader.validation.start}
      end: ${dataloader.validation.end}
      frequency: ${data.frequency}
      drop: []
      select: ${dataloader.select_forcings}
      fake_forecasts:
        start: ${dataloader.valid_date}
        end: ${dataloader.valid_date}
        steps: ${dataloader.steps}
    out_hres:
      dataset: ${system.input.dataset_out_hres}
      start: ${dataloader.validation.start}
      end: ${dataloader.validation.end}
      frequency: ${data.frequency}
      drop: []
      select: ${dataloader.select_matched_output}
      fake_forecasts:
        start: ${dataloader.valid_date}
        end: ${dataloader.valid_date}
        steps: ${dataloader.steps}

test:
  start: 1900
  end: 1901
  datasets:
    in_lres:
      dataset: ${system.input.dataset_in_lres}
      start: ${dataloader.test.start}
      end: ${dataloader.test.end}
      frequency: ${data.frequency}
      drop: []
      select: ${dataloader.select_matched_input}
      fake_forecasts:
        start: ${dataloader.valid_date}
        end: ${dataloader.valid_date}
        steps: ${dataloader.steps}
    in_hres:
      dataset: ${system.input.dataset_in_hres}
      start: ${dataloader.test.start}
      end: ${dataloader.test.end}
      frequency: ${data.frequency}
      drop: []
      select: ${dataloader.select_forcings}
      fake_forecasts:
        start: ${dataloader.valid_date}
        end: ${dataloader.valid_date}
        steps: ${dataloader.steps}
    out_hres:
      dataset: ${system.input.dataset_out_hres}
      start: ${dataloader.test.start}
      end: ${dataloader.test.end}
      frequency: ${data.frequency}
      drop: []
      select: ${dataloader.select_matched_output}
      fake_forecasts:
        start: ${dataloader.valid_date}
        end: ${dataloader.valid_date}
        steps: ${dataloader.steps}
