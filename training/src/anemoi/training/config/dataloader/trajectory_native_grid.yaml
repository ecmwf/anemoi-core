prefetch_factor: 2
pin_memory: True

# ============
# read_group_size:
#   Form subgroups of model comm groups that read data together.
#   Each reader in the group only reads 1/read_group_size of the data
#   which is then all-gathered between the group.
#   This can reduce CPU memory usage as well as increase dataloader throughput.
#   The number of GPUs per model must be divisible by read_group_size.
#   To disable, set to 1.
# ============
read_group_size: ${system.hardware.num_gpus_per_model}

num_workers:
  training: 8
  validation: 8
  test: 8
batch_size:
  training: 2
  validation: 4
  test: 4

# runs only N training batches [N = integer | null]
# if null then we run through all the batches
limit_batches:
  training: null
  validation: null
  test: 20

# ============
# Forecast (trajectory) dataloader
#
# Reads a 5-D ``trajectories``-layout dataset (shape
# (base_dates, variables, ensembles, steps, cells)) through open_dataset.
# Each base date (forecast initialisation) is an independent sequence and the
# forecast step is the within-sequence position, so a sample never crosses an
# initialisation boundary.
#
# - The ``trajectory`` block selects the TrajectoryDataset reader. ``sampling``
#   controls how anchor positions are drawn within each forecast:
#     * non_overlapping : a stride of windows so samples never share a step
#     * all             : every valid step position
# - start/end filter base dates on the valid-time envelope (base + step range).
# - Step subsetting (steps / step_start / step_end / step_frequency) can be
#   added inside dataset_config and is forwarded to open_dataset.
# ============

dataset: ${system.input.dataset}

training:
  datasets:
    data:
      dataset_config:
        dataset: ${dataloader.dataset}
        drop: []
      start: null
      end: 2020
      trajectory:
        sampling: non_overlapping

validation:
  datasets:
    data:
      dataset_config:
        dataset: ${dataloader.dataset}
        drop: []
      start: 2021
      end: 2021
      trajectory:
        sampling: non_overlapping

test:
  datasets:
    data:
      dataset_config:
        dataset: ${dataloader.dataset}
        drop: []
      start: 2022
      end: null
      trajectory:
        sampling: non_overlapping
