defaults:
- data: zarr
- dataloader: native_grid
- diagnostics: evaluation
- system: example
- graph: multi_scale
- model: graphtransformer
- task: temporal_downscaler
- training: single
- _self_

config_validation: True

### This file is for local experimentation.
##  When you commit your changes, assign the new features and keywords
##  to the correct defaults.
# For example to change from default GPU count:
# system:
#   hardware:
#     num_gpus_per_node: 1

diagnostics:
  plot:
    callbacks: []
  callbacks: []

training:
  training_loss:
    datasets:
      data:
        _target_: anemoi.training.losses.CombinedLoss
        loss_weights: [1.0, 1.0]
        losses:
          - _target_: anemoi.training.losses.MSELoss
            scalers: ['pressure_level', 'general_variable', 'node_weights', 'time_steps']
            ignore_nans: False
          - _target_: anemoi.training.losses.TimeAggregateLossWrapper
            time_aggregation_types: [mean, diff]
            loss_fn:
              _target_: anemoi.training.losses.MSELoss
            scalers: ['pressure_level', 'general_variable', 'node_weights', 'time_steps']
            ignore_nans: False
