defaults:
- data: zarr
- dataloader: forecast_native_grid
- diagnostics: evaluation
- system: example
- graph: multi_scale
- model: graphtransformer
- task: temporal_downscaler
- training: single
- override training/training_loss: single_MSE_aggregation
- _self_

config_validation: True

data:
  frequency: null
  datasets:
    data:
      forcing:
        - "cos_latitude"
        - "cos_longitude"
        - "sin_latitude"
        - "sin_longitude"
        - "cos_julian_day"
        - "cos_local_time"
        - "sin_julian_day"
        - "sin_local_time"
        - "insolation"
        - "lsm"
        - "z"
      processors:
        normalizer:
          config:
            max: ["z"]
            none:
              - "cos_latitude"
              - "cos_longitude"
              - "sin_latitude"
              - "sin_longitude"
              - "cos_julian_day"
              - "cos_local_time"
              - "sin_julian_day"
              - "sin_local_time"
              - "insolation"

### This file is for local experimentation.
##  When you commit your changes, assign the new features and keywords
##  to the correct defaults.
# For example to change from default GPU count:
# system:
#   hardware:
#     num_gpus_per_node: 1

diagnostics:
  plot:
    callbacks: []
  callbacks:
    - _target_: anemoi.training.diagnostics.callbacks.per_timestep_metrics.PerTimestepMetrics
      every_n_batches: 20
