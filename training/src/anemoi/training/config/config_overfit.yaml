  files:
    dataset: arome-an-oper-titan-0p025-2020-2024-1h-v4-eurw-precip6.zarr
    graph: /project/home/p200177/DE_371/avritj/multi_scale_res10.pt
  num_gpus_per_node: 4
  num_gpus_per_model: 2
  num_nodes: 1
