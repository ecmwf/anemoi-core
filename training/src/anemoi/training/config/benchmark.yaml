defaults:
  - data: zarr
  - dataloader: native_grid
  - diagnostics: evaluation
  - system: example
  - graph: multi_scale
  - model: gnn
  - training: default
  - _self_

config_validation: True

# ─── Paths ───────────────────────────────────────────────────────────────────
system:
  input:
    dataset: storage/benchmark/benchmark.zarr
    # loader appends _{dataset_name}.pt → looks for graph_data.pt (see symlink)
    graph: storage/benchmark/stage_a/graph.pt
  output:
    root: checkpoints

# ─── Load existing graph, don't rebuild ──────────────────────────────────────
graph:
  overwrite: False
  data: "grid"
  hidden: "mesh"

dataloader:
  batch_size:
    training: 1
    validation: 1
    test: 1
  num_workers:
    training: 2
    validation: 2
    test: 2
  training:
    datasets:
      data:
        start: null
        end: "2024-12-31"
  validation:
    datasets:
      data:
        start: null
        end: "2024-12-31"
  test:
    datasets:
      data:
        start: null
        end: "2024-12-31"

# ─── Disable MLflow ──────────────────────────────────────────────────────────
diagnostics:
  log:
    mlflow:
      enabled: False
      tracking_uri: "file://checkpoints/mlflow"

# ─── Minimal model ───────────────────────────────────────────────────────────
model:
  num_channels: 16
  processor:
    num_layers: 1
    num_chunks: 1

# ─── Short benchmark run ──────────────────────────────────────────────────────
training:
  max_steps: 100
  max_epochs: null
