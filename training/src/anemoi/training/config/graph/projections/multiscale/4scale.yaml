---
defaults:
  - _self_

# 4-scale multiscale smoothing (K=16/32/64/128) on the same geometry as the data nodes.
# Sigmas are approximately 1x/2x/4x/8x the grid spacing in radians.
num_scales: 4
base_num_nearest_neighbours: 16
base_sigma: 0.00471
scale_factor: 2
edge_weight_attribute: gauss_weight
gaussian_norm: l1
