---
defaults:
  - _self_

# 4-scale multiscale smoothing (K=16/32/64/128) on the same geometry as the data nodes.
smoothers:
  smooth_1x:
    edge_weight_attribute: gauss_weight
    gaussian_norm: l1
    num_nearest_neighbours: 16
    sigma: 0.00471
  smooth_2x:
    edge_weight_attribute: gauss_weight
    gaussian_norm: l1
    num_nearest_neighbours: 32
    sigma: 0.00942
  smooth_4x:
    edge_weight_attribute: gauss_weight
    gaussian_norm: l1
    num_nearest_neighbours: 64
    sigma: 0.01884
  smooth_8x:
    edge_weight_attribute: gauss_weight
    gaussian_norm: l1
    num_nearest_neighbours: 128
    sigma: 0.03768
