---
defaults:
  - _self_

# 4-scale multiscale smoothing for o96 (~100 km) using KNN=16/32/64/128.
# Sigmas are approximately 1x/2x/4x/8x the o96 grid spacing in radians.
num_scales: 4
base_num_nearest_neighbours: 16
base_sigma: 0.01570
scale_factor: 2
edge_weight_attribute: gauss_weight
gaussian_norm: l1
