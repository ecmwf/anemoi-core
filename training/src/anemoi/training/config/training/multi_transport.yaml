---
defaults:
  - multi
  - _self_

method:
  _target_: anemoi.training.train.methods.TransportTraining
transport:
  prediction_mode: state
  objective: edm_diffusion
  uncertainty_weighting:
    enabled: false
    num_channels: 32
    max_period: 10000
    warmup_steps: 0
    logvar_clamp: 8.0

# ERA5 is an input/source dataset here; CERRA is the supervised high-resolution
# target. EDM diffusion supplies per-sample weights, so the target loss applies
# them explicitly.
training_loss:
  datasets:
    era5: null
    cerra:
      _target_: anemoi.training.losses.WeightedMSELoss
      scalers: ['pressure_level', 'general_variable', 'nan_mask_weights', 'node_weights', 'time_steps']
      ignore_nans: false
