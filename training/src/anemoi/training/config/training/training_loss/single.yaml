datasets:
  data:
    _target_: anemoi.training.losses.MSELoss
    # Scalers to include in loss calculation
    # A selection of available scalers are listed in training/scalers.
    # '*' is a valid entry to use all `scalers` given, if a scaler is to be excluded
    # add `!scaler_name`, i.e. ['*', '!scaler_1'], and `scaler_1` will not be added.
    scalers: ['pressure_level', 'general_variable', 'node_weights', 'time_steps']
    ignore_nans: False

    # # disable variables compatibility check for target-vs-prediction
    # # if the metadata in your dataset is incorrect
    # check_variables_compatibility:
    #   ignore_units: True # bool, or list of variable names to ignore units for
    #   ignore_period: False # bool, or list of variable names to ignore periods for
