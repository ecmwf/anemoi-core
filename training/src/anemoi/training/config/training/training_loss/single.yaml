datasets:
  data:
    _target_: anemoi.training.losses.MSELoss
    # Scalers to include in loss calculation
    # A selection of available scalers are listed in training/scalers.
    # '*' is a valid entry to use all `scalers` given, if a scaler is to be excluded
    # add `!scaler_name`, i.e. ['*', '!scaler_1'], and `scaler_1` will not be added.
    scalers: ['pressure_level', 'general_variable', 'node_weights', 'time_steps']
    ignore_nans: False

    # To remap predicted variables to different target variables (e.g. model output 'tp' vs.
    # observation 'imerg') add predicted_variables / target_variables to the relevant sub-loss
    # entry. If the dataset metadata is incorrect, suppress the compatibility check there:
    # target_variables: [imerg]
    # check_variables_compatibility:
    #   ignore_units: False   # True, or list of variable names
    #   ignore_period: False  # True, or list of variable names
