# Rendering settings shared across all callbacks in this plot config.
# These are passed as a PlottingSettings object to every plot_fn call.
#
# - asynchronous, datashader, projection_kind: control how maps are rendered.
# - precip_and_related_fields: variables that use precipitation-specific colour
#   scaling (e.g. BoundaryNorm). Shared here so all callbacks treat the same
#   fields consistently without repeating the list in every plot_fn block.
# - colormaps: shared colour maps (keyed by 'default', 'error', or variable
#   group name). Shared for the same reason as precip_and_related_fields.
#   Plot-function-specific options (e.g. accumulation_levels_plot, per_sample,
#   log_scale) belong inside plot_fn: in the callback config, not here.
settings:
  asynchronous: true
  projection_kind: equirectangular  # or lambert_conformal (requires cartopy)
  datashader: true
  precip_and_related_fields: [tp, cp]
  colormaps: null  # override in variant configs

frequency:
  batch: 750
  epoch: 5

sample_idx: 0

parameters:
  - z_500
  - t_850
  - u_850
  - v_850
  - 2t
  - 10u
  - 10v
  - sp
  - tp
  - cp

datasets_to_plot: ["data"]

focus_areas:
  europe:
    latlon_bbox: [30.0, -20.0, 60.0, 40.0]
  china:
    latlon_bbox: [18.0, 73.0, 54.0, 135.0]
