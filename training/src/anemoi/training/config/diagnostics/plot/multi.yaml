asynchronous: True # Whether to plot asynchronously
projection_kind: equirectangular  # or lambert_conformal (requires cartopy)
datashader: True # Choose which technique to use for plotting
frequency: # Frequency of the plotting
  batch: 750
  epoch: 5

# Parameters to plot
parameters:
- z_500
- t_850
- u_850
- v_850
- 2t
- 10u
- 10v
- sp
- tp
- cp

# Sample index
sample_idx: 0

# Precipitation and related fields
precip_and_related_fields: [tp, cp]

# select colormaps
colormaps:
  default:
    _target_: anemoi.training.utils.custom_colormaps.MatplotlibColormap
    name: viridis
  # in order to use distinctipy, you need to install the package
  # default:
  #   _target_: anemoi.training.utils.custom_colormaps.DistinctipyColormap
  #   n_colors: 8
  error:
    _target_: anemoi.training.utils.custom_colormaps.MatplotlibColormap
    name: bwr
  precip:
    _target_: anemoi.training.utils.custom_colormaps.MatplotlibColormapClevels
    clevels: ["#ffffff", "#04e9e7", "#019ff4", "#0300f4", "#02fd02", "#01c501", "#008e00", "#fdf802", "#e5bc00", "#fd9500", "#fd0000", "#d40000", "#bc0000", "#f800fd"]
    variables: ${diagnostics.plot.precip_and_related_fields}

datasets_to_plot: ["era5", "cerra"] # Default dataset names to use in the plot callbacks

focus_areas:
  europe:
    latlon_bbox: [30.0, -20.0, 60.0, 40.0]
  china:
    latlon_bbox: [18.0, 73.0, 54.0, 135.0]

callbacks:
  # Add plot callbacks here
  - _target_: anemoi.training.diagnostics.callbacks.plot.GraphFeaturePlot
    every_n_epochs: 5
    dataset_names: ${diagnostics.plot.datasets_to_plot}
    # `plot_fn` is optional — omit to use the default. Provide a Hydra-instantiable
    # partial to swap in a custom visualisation (yielding `(figure, tag)` pairs).
    plot_fn:
      _target_: anemoi.training.diagnostics.evaluation.plotting.graph.graph_plot_fn
      _partial_: true
  - _target_: anemoi.training.diagnostics.callbacks.plot.LossCurvePlot
    dataset_names: ${diagnostics.plot.datasets_to_plot}
    parameter_groups:
      moisture: [tp, cp, tcw]
      sfc_wind: [10u, 10v]
    every_n_batches: ${diagnostics.plot.frequency.batch}
    # `plot_fn` is optional — omit to use the default. Provide a Hydra-instantiable
    # partial to swap in a custom bar chart / rendering.
    plot_fn:
      _target_: anemoi.training.diagnostics.evaluation.plotting.loss.loss_plot_fn
      _partial_: true
  - _target_: anemoi.training.diagnostics.callbacks.plot.SpatialMapPlot
    tag_infix: sample
    dataset_names: ["era5"]
    sample_idx: ${diagnostics.plot.sample_idx}
    parameters: ${diagnostics.plot.parameters}
    every_n_batches: ${diagnostics.plot.frequency.batch}
    with_auxiliary: true
    plot_fn:
      _target_: anemoi.training.diagnostics.evaluation.plotting.spatial_map.sample_plot_fn
      _partial_: true
      per_sample: 6
      accumulation_levels_plot: [0, 0.05, 0.1, 0.25, 0.5, 1, 1.5, 2, 3, 4, 5, 6, 7, 100]
  - _target_: anemoi.training.diagnostics.callbacks.plot.SpatialMapPlot
    tag_infix: histo
    dataset_names: ["era5"]
    sample_idx: ${diagnostics.plot.sample_idx}
    every_n_batches: ${diagnostics.plot.frequency.batch}
    parameters: [z_500, tp, 2t, 10u, 10v]
    plot_fn:
      _target_: anemoi.training.diagnostics.evaluation.plotting.spatial_map.histogram_plot_fn
      _partial_: true
  - _target_: anemoi.training.diagnostics.callbacks.plot.SpatialMapPlot
    tag_infix: histo
    dataset_names: ["cerra"]
    sample_idx: ${diagnostics.plot.sample_idx}
    every_n_batches: ${diagnostics.plot.frequency.batch}
    parameters: [z_500, tp, 2t]
    plot_fn:
      _target_: anemoi.training.diagnostics.evaluation.plotting.spatial_map.histogram_plot_fn
      _partial_: true
  - _target_: anemoi.training.diagnostics.callbacks.plot.SpatialMapPlot
    tag_infix: sample
    dataset_names: ["cerra"]
    sample_idx: ${diagnostics.plot.sample_idx}
    parameters: [z_500, t_850, u_850, v_850, 2t, tp]
    every_n_batches: ${diagnostics.plot.frequency.batch}
    with_auxiliary: true
    plot_fn:
      _target_: anemoi.training.diagnostics.evaluation.plotting.spatial_map.sample_plot_fn
      _partial_: true
      per_sample: 6
      accumulation_levels_plot: [0, 0.05, 0.1, 0.25, 0.5, 1, 1.5, 2, 3, 4, 5, 6, 7, 100]
