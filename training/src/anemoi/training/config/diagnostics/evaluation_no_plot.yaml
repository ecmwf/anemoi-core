---
defaults:
  - plot: none
  - callbacks: placeholder
  - benchmark_profiler: detailed

debug:
  anomaly_detection: False

enable_checkpointing: True
checkpoint:
  every_n_minutes:
    save_frequency: 30
    num_models_saved: 3

  every_n_epochs:
    save_frequency: 1
    num_models_saved: -1

  every_n_train_steps:
    save_frequency: null
    num_models_saved: 0

log:
  wandb:
    enabled: False
    offline: False
    log_model: False
    project: "Anemoi"
    entity: ???
    gradients: False
    parameters: False
  tensorboard:
    enabled: False
  mlflow:
    enabled: False
    _target_: anemoi.training.diagnostics.mlflow.logger.AnemoiMLflowLogger
    offline: False
    authentication: False
    tracking_uri: ???
    experiment_name: "anemoi-debug"
    project_name: "Anemoi"
    system: False
    terminal: True
    run_name: null
    on_resume_create_child: True
    expand_hyperparams:
      - config
    http_max_retries: 35
    max_params_length: 2000
    save_dir: ${system.output.logs.mlflow}
  interval: 100

enable_progress_bar: True
progress_bar:
  _target_: pytorch_lightning.callbacks.TQDMProgressBar
  refresh_rate: 1

check_val_every_n_epoch: 1
print_memory_summary: False
