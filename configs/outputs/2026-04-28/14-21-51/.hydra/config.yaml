data:
  format: zarr
  frequency: 1h
  datasets:
    data:
      forcing:
      - cos_latitude
      - cos_longitude
      - sin_latitude
      - sin_longitude
      - cos_julian_day
      - cos_local_time
      - sin_julian_day
      - sin_local_time
      - insolation
      - lsm
      - z
      diagnostic:
      - tp
      - cp
      - tcc
      - hcc
      - lcc
      - mcc
      - ssrd
      - strd
      processors:
        normalizer:
          _target_: anemoi.models.preprocessing.normalizer.InputNormalizer
          config:
            default: mean-std
            remap:
              cp: tp
            std:
            - tp
            - cp
            - ssrd
            - q_50
            - q_100
            - q_150
            - q_200
            - q_250
            - q_300
            - q_400
            - q_500
            - q_600
            - q_700
            - q_850
            - q_925
            - q_1000
            min-max: null
            max:
            - z
            none:
            - cos_latitude
            - cos_longitude
            - sin_latitude
            - sin_longitude
            - cos_julian_day
            - cos_local_time
            - sin_julian_day
            - sin_local_time
            - insolation
            - lsm
            - tcc
            - mcc
            - hcc
            - lcc
  num_features: null
dataloader:
  prefetch_factor: 2
  pin_memory: true
  read_group_size: ${system.hardware.num_gpus_per_model}
  num_workers:
    training: 8
    validation: 4
    test: 8
  batch_size:
    training: 1
    validation: 1
    test: 4
  limit_batches:
    training: 2000
    validation: 100
    test: 20
  dataset: ${system.input.dataset}
  model_run_info: null
  training:
    datasets:
      data:
        dataset_config:
          dataset: ${dataloader.dataset}
          frequency: ${data.frequency}
          drop:
          - u_10
          - v_10
          - w_10
          - z_10
          - q_10
          - t_10
        start: '2016-01-01'
        end: '2022-05-31'
        trajectory: ${dataloader.model_run_info}
  validation:
    datasets:
      data:
        dataset_config:
          dataset: ${dataloader.dataset}
          frequency: ${data.frequency}
          drop:
          - u_10
          - v_10
          - w_10
          - z_10
          - q_10
          - t_10
        start: '2022-06-01'
        end: '2023-05-31'
        trajectory: ${dataloader.model_run_info}
  test:
    datasets:
      data:
        dataset_config:
          dataset: ${dataloader.dataset}
          frequency: ${data.frequency}
          drop: []
        start: 2022
        end: null
        trajectory: ${dataloader.model_run_info}
diagnostics:
  plot:
    asynchronous: true
    projection_kind: equirectangular
    datashader: true
    frequency:
      batch: 750
      epoch: 10
    parameters:
    - z_500
    - t_850
    - u_850
    - v_850
    - 2t
    - 10u
    - 10v
    - sp
    - tp
    - cp
    sample_idx: 0
    precip_and_related_fields:
    - tp
    - cp
    colormaps:
      precip:
        _target_: anemoi.training.utils.custom_colormaps.MatplotlibColormapClevels
        clevels:
        - '#ffffff'
        - '#04e9e7'
        - '#019ff4'
        - '#0300f4'
        - '#02fd02'
        - '#01c501'
        - '#008e00'
        - '#fdf802'
        - '#e5bc00'
        - '#fd9500'
        - '#fd0000'
        - '#d40000'
        - '#bc0000'
        - '#f800fd'
        variables: ${diagnostics.plot.precip_and_related_fields}
    datasets_to_plot:
    - data
    focus_areas:
      europe:
        latlon_bbox:
        - 30.0
        - -20.0
        - 60.0
        - 40.0
      china:
        latlon_bbox:
        - 18.0
        - 73.0
        - 54.0
        - 135.0
    callbacks: []
  benchmark_profiler:
    memory:
      enabled: false
      steps: 5
      warmup: 2
      extra_plots: false
      trace_rank0_only: false
    time:
      enabled: true
      verbose: false
    speed:
      enabled: true
    system:
      enabled: false
    model_summary:
      enabled: false
    snapshot:
      enabled: false
      steps: 4
      warmup: 0
  log:
    mlflow:
      enabled: true
      _target_: anemoi.training.diagnostics.mlflow.logger.AnemoiMLflowLogger
      offline: true
      authentication: true
      tracking_uri: https://mlflow.ecmwf.int
      experiment_name: aifs
      project_name: Anemoi
      system: true
      terminal: true
      run_name: interpolator
      on_resume_create_child: true
      expand_hyperparams:
      - config
      http_max_retries: 35
      max_params_length: 2000
      save_dir: ${system.output.logs.mlflow}
    interval: 100
  callbacks: []
  debug:
    anomaly_detection: false
  enable_checkpointing: true
  checkpoint:
    every_n_minutes:
      save_frequency: 30
      num_models_saved: 3
    every_n_epochs:
      save_frequency: 1
      num_models_saved: -1
    every_n_train_steps:
      save_frequency: null
      num_models_saved: 0
  enable_progress_bar: true
  progress_bar:
    _target_: pytorch_lightning.callbacks.TQDMProgressBar
    refresh_rate: 1
  check_val_every_n_epoch: 1
  print_memory_summary: false
system:
  output:
    root: /e/scratch/gkpdm/clare1/new/
    logs:
      root: logs
      wandb: wandb
      mlflow: mlflow
      tensorboard: tensorboard
    checkpoints:
      root: checkpoint
      every_n_epochs: anemoi-by_epoch-epoch_{epoch:03d}-step_{step:06d}
      every_n_train_steps: anemoi-by_step-epoch_{epoch:03d}-step_{step:06d}
      every_n_minutes: anemoi-by_time-epoch_{epoch:03d}-step_{step:06d}
    plots: plots
    profiler: profiler
  input:
    dataset: /e/data1/jureap-data/ecmwf/gkpdm/datasets/aifs-ea-an-oper-0001-mars-o96-1979-2024-1h-v3-with-era51.zarr
    graph: graph_anemoi_new.pt
    truncation: null
    truncation_inv: null
    loss_matrices_path: null
    warm_start: null
  hardware:
    accelerator: auto
    num_gpus_per_node: ${oc.decode:${oc.env:SLURM_GPUS_PER_NODE}}
    num_nodes: 1
    num_gpus_per_model: 1
    num_gpus_per_ensemble: 2
graph:
  overwrite: true
  nodes:
    data:
      node_builder:
        _target_: anemoi.graphs.nodes.AnemoiDatasetNodes
        dataset: ${dataloader.training.datasets.data.dataset_config}
      attributes: ${graph.attributes.nodes}
    hidden:
      node_builder:
        _target_: anemoi.graphs.nodes.TriNodes
        resolution: 6
  edges:
  - source_name: data
    target_name: hidden
    edge_builders:
    - _target_: anemoi.graphs.edges.KNNEdges
      num_nearest_neighbours: 12
      source_mask_attr_name: null
      target_mask_attr_name: null
    attributes: ${graph.attributes.edges}
  - source_name: hidden
    target_name: hidden
    edge_builders:
    - _target_: anemoi.graphs.edges.MultiScaleEdges
      x_hops: 1
      scale_resolutions: ${graph.nodes.hidden.node_builder.resolution}
      source_mask_attr_name: null
      target_mask_attr_name: null
    attributes: ${graph.attributes.edges}
  - source_name: hidden
    target_name: data
    edge_builders:
    - _target_: anemoi.graphs.edges.KNNEdges
      num_nearest_neighbours: 3
      source_mask_attr_name: null
      target_mask_attr_name: null
    attributes: ${graph.attributes.edges}
  attributes:
    nodes:
      area_weight:
        _target_: anemoi.graphs.nodes.attributes.SphericalAreaWeights
        norm: unit-max
        fill_value: 0
    edges:
      edge_length:
        _target_: anemoi.graphs.edges.attributes.EdgeLength
        norm: unit-std
      edge_dirs:
        _target_: anemoi.graphs.edges.attributes.EdgeDirection
        norm: unit-std
  post_processors: []
model:
  num_channels: 1024
  condition_on_residual: false
  output_mask:
    _target_: anemoi.training.utils.masks.NoOutputMask
  cpu_offload: false
  keep_batch_sharded: true
  model:
    _target_: anemoi.models.models.AnemoiEnsModelEncProcDec
    hidden_nodes_name: hidden
    latent_skip: true
  noise_injector:
    _target_: anemoi.models.layers.ensemble.NoiseConditioning
    noise_std: 1
    noise_channels_dim: 4
    noise_mlp_hidden_dim: 32
    noise_matrix: null
    row_normalize_noise_matrix: false
    autocast: false
    layer_kernels:
      Activation:
        _target_: torch.nn.GELU
  layer_kernels:
    LayerNorm:
      _target_: torch.nn.LayerNorm
    Linear:
      _target_: torch.nn.Linear
    Activation:
      _target_: torch.nn.GELU
    QueryNorm:
      _target_: anemoi.models.layers.normalization.AutocastLayerNorm
      bias: false
    KeyNorm:
      _target_: anemoi.models.layers.normalization.AutocastLayerNorm
      bias: false
  processor:
    _target_: anemoi.models.layers.processor.GraphTransformerProcessor
    trainable_size: ${model.trainable_parameters.hidden2hidden}
    sub_graph_edge_attributes: ${model.attributes.edges}
    num_layers: 16
    num_chunks: 8
    mlp_hidden_ratio: 4
    num_heads: 16
    qk_norm: true
    cpu_offload: ${model.cpu_offload}
    gradient_checkpointing: true
    graph_attention_backend: triton
    edge_pre_mlp: false
    layer_kernels:
      LayerNorm:
        _target_: anemoi.models.layers.normalization.ConditionalLayerNorm
        normalized_shape: ${model.num_channels}
        condition_shape: ${model.noise_injector.noise_channels_dim}
        zero_init: true
        autocast: false
      Linear:
        _target_: torch.nn.Linear
      Activation:
        _target_: torch.nn.GELU
      QueryNorm:
        _target_: anemoi.models.layers.normalization.AutocastLayerNorm
        bias: false
      KeyNorm:
        _target_: anemoi.models.layers.normalization.AutocastLayerNorm
        bias: false
  encoder:
    _target_: anemoi.models.layers.mapper.GraphTransformerForwardMapper
    trainable_size: ${model.trainable_parameters.data2hidden}
    sub_graph_edge_attributes: ${model.attributes.edges}
    num_chunks: 8
    mlp_hidden_ratio: 4
    num_heads: 16
    qk_norm: false
    cpu_offload: ${model.cpu_offload}
    gradient_checkpointing: true
    layer_kernels: ${model.layer_kernels}
    shard_strategy: edges
    graph_attention_backend: triton
    edge_pre_mlp: false
  decoder:
    _target_: anemoi.models.layers.mapper.GraphTransformerBackwardMapper
    trainable_size: ${model.trainable_parameters.hidden2data}
    sub_graph_edge_attributes: ${model.attributes.edges}
    num_chunks: 8
    mlp_hidden_ratio: 4
    num_heads: 16
    initialise_data_extractor_zero: false
    qk_norm: false
    cpu_offload: ${model.cpu_offload}
    gradient_checkpointing: true
    layer_kernels: ${model.layer_kernels}
    shard_strategy: edges
    graph_attention_backend: triton
    edge_pre_mlp: false
  residual:
    _target_: anemoi.models.layers.residual.SkipConnection
    step: -1
  trainable_parameters:
    data: 0
    hidden: 0
    data2hidden: 0
    hidden2data: 0
    hidden2hidden: 0
  attributes:
    edges:
    - edge_length
    - edge_dirs
    nodes: []
  compile:
  - module: anemoi.models.layers.conv.GraphTransformerConv
  - module: anemoi.models.layers.normalization.ConditionalLayerNorm
  bounding:
  - _target_: anemoi.models.layers.bounding.ReluBounding
    variables:
    - tp
  - _target_: anemoi.models.layers.bounding.HardtanhBounding
    variables:
    - tcc
    - hcc
    - mcc
    - lcc
    min_val: 0
    max_val: 1
task:
  _target_: anemoi.training.tasks.TemporalDownscaler
  input_timestep: 6H
  output_timestep: 1H
  output_left_boundary: false
  output_right_boundary: false
training:
  scalers:
    datasets:
      data:
        general_variable:
          _target_: anemoi.training.losses.scalers.GeneralVariableLossScaler
          weights:
            default: 1
            q: 1
            t: 1
            u: 1
            v: 1
            w: 0.1
            z: 1
            sp: 1
            10u: 1
            10v: 1
            2d: 1
            tp: 0.025
            cp: 0.0025
            msl: 1
        pressure_level:
          _target_: anemoi.training.losses.scalers.ReluVariableLevelScaler
          group: pl
          y_intercept: 0.2
          slope: 0.001
        nan_mask_weights:
          _target_: anemoi.training.losses.scalers.NaNMaskScaler
        stdev_tendency:
          _target_: anemoi.training.losses.scalers.StdevTendencyScaler
        var_tendency:
          _target_: anemoi.training.losses.scalers.VarTendencyScaler
        node_weights:
          _target_: anemoi.training.losses.scalers.GraphNodeAttributeScaler
          nodes_attribute_name: area_weight
          norm: unit-sum
        time_steps:
          _target_: anemoi.training.losses.scalers.UniformTimeStepScaler
  training_loss:
    datasets:
      data:
        _target_: anemoi.training.losses.combined.CombinedLoss
        scalers:
        - pressure_level
        - general_variable
        - nan_mask_weights
        - node_weights
        - time_steps
        ignore_nans: false
        losses:
        - _target_: anemoi.training.losses.kcrps.AlmostFairKernelCRPS
          scalers:
          - pressure_level
          - general_variable
          - nan_mask_weights
          - node_weights
          - time_steps
          ignore_nans: false
          no_autocast: true
          alpha: 0.95
        - _target_: anemoi.training.losses.aggregate.TimeAggregateLossWrapper
          time_aggregation_types:
          - mean
          - max
          - min
          - diff
          loss_fn:
            _target_: anemoi.training.losses.kcrps.AlmostFairKernelCRPS
            scalers:
            - pressure_level
            - general_variable
            - nan_mask_weights
            - node_weights
            ignore_nans: false
            no_autocast: true
            alpha: 0.95
  optimization:
    optimizer:
      _target_: torch.optim.AdamW
      betas:
      - 0.9
      - 0.95
    lr_scheduler:
      _target_: timm.scheduler.CosineLRScheduler
      lr_min: 3.0e-07
      t_initial: 200000
      warmup_t: 1000
      t_in_epochs: false
    lr: 5.0e-05
    pl_lr_scheduler:
      interval: step
  run_id: null
  fork_run_id: null
  transfer_learning: false
  load_weights_only: false
  update_ds_stats_on_ckpt_load:
    states: false
    tendencies: true
  deterministic: false
  precision: 16-mixed
  accum_grad_batches: 1
  num_sanity_val_steps: 6
  gradient_clip:
    val: 32.0
    algorithm: value
  training_method: anemoi.training.train.methods.EnsembleTraining
  ensemble_size_per_device: 1
  strategy:
    _target_: anemoi.training.distributed.strategy.DDPEnsGroupStrategy
    num_gpus_per_ensemble: ${system.hardware.num_gpus_per_ensemble}
    num_gpus_per_model: ${system.hardware.num_gpus_per_model}
    read_group_size: ${dataloader.read_group_size}
  loss_gradient_scaling: false
  validation_metrics:
    datasets:
      data:
        fkcrps:
          _target_: anemoi.training.losses.kcrps.AlmostFairKernelCRPS
          scalers:
          - node_weights
          - time_steps
          ignore_nans: false
          alpha: 1.0
        multiscale:
          _target_: anemoi.training.losses.MultiscaleLossWrapper
          loss_matrices_path: ${system.input.loss_matrices_path}
          loss_matrices:
          - null
          weights:
          - 1.0
          keep_batch_sharded: ${model.keep_batch_sharded}
          per_scale_loss:
            _target_: anemoi.training.losses.kcrps.AlmostFairKernelCRPS
            scalers:
            - node_weights
            - time_steps
            ignore_nans: false
            no_autocast: true
            alpha: 1.0
  variable_groups:
    datasets:
      data:
        default: sfc
        pl:
          param:
          - q
          - t
          - u
          - v
          - w
          - z
  metrics:
    datasets:
      data:
      - z_500
      - t_850
      - u_850
      - v_850
  max_epochs: null
  max_steps: 200000
  submodules_to_freeze: []
  recompile_limit: 32
config_validation: true
