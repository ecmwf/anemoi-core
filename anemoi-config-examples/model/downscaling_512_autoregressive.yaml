#
# Autoregressive downscaler. Identical to downscaling_512.yaml except for the
# `model.autoregressive` block, which feeds the previous high-res (CERRA) step
# as extra conditioning for temporal coherence. With `use_previous_step: false`
# (or the block absent) behaviour is exactly the pure downscaler.
num_channels: 512
cpu_offload: False

keep_batch_sharded: False

model:
  _target_: anemoi.models.models.AnemoiDownscalingModelEncProcDec
  # Diffusion parameters
  diffusion:
    sigma_data: 1.0
    noise_channels: 32
    noise_cond_dim: 16
    sigma_max: 100000.0
    sigma_min: 0.02
    rho: 7.0
    log_normal_mean: -1.2
    log_normal_std: 1.2
    noise_embedder:
      _target_: anemoi.models.layers.diffusion.SinusoidalEmbeddings
      num_channels: ${model.model.diffusion.noise_channels}
      max_period: 1000
    inference_defaults:
      noise_scheduler:
        schedule_type: "karras"
        sigma_max: 100000.0
        sigma_min: 0.03
        rho: 7.0
        num_steps: 80
      diffusion_sampler:
        sampler: "heun"
        S_churn: 2.5
        S_min: 0.75
        S_max: 100000
        S_noise: 1.05
  # Autoregressive conditioning on the previous high-res step.
  autoregressive:
    # Master switch. When false, the model is exactly the pure downscaler
    # (no extra input channels, no window) so existing recipes are unaffected.
    use_previous_step: true
    # Number of previous high-res steps to load (only the immediately
    # preceding one is fed as conditioning); controls the loaded time window.
    num_previous_steps: 1
    # Strength of the previous-step pathway. Init 0.0 so that, together with
    # the zero-padded emb_nodes_src columns produced on weight import, the
    # autoregressive model starts out bit-identical to the imported downscaler.
    gate_init: 0.0
    # If true the gate is a learned scalar; if false it stays fixed at
    # gate_init (useful to cap AR influence for long rollouts).
    gate_learnable: true
    # Optional: per-sample probability of dropping the previous step during
    # training, so one run mixes AR and downscale-only samples.
    p_no_previous: 0.0
    # Loss reweighting for samples with / without the previous step.
    loss_weight_previous: 1.0
    loss_weight_no_previous: 1.0

layer_kernels:
  # The layer_kernels can be adjusted per model component, but are defined here for convenience.
  LayerNorm:
    _target_: anemoi.models.layers.normalization.ConditionalLayerNorm
    normalized_shape: ${model.num_channels}
    condition_shape: 16
    w_one_bias_zero_init: True
    autocast: false
  Linear:
    _target_: torch.nn.Linear
  Activation:
    _target_: torch.nn.GELU
  QueryNorm:
    _target_: anemoi.models.layers.normalization.AutocastLayerNorm
    bias: False
  KeyNorm:
    _target_: anemoi.models.layers.normalization.AutocastLayerNorm
    bias: False

processor:
  _target_: anemoi.models.layers.processor.GraphTransformerProcessor
  trainable_size: ${model.trainable_parameters.hidden2hidden}
  sub_graph_edge_attributes: ${model.attributes.edges}
  num_layers: 16
  num_chunks: 2
  mlp_hidden_ratio: 4 # GraphTransformer or Transformer only
  num_heads: 4 # GraphTransformer or Transformer only
  qk_norm: False
  cpu_offload: ${model.cpu_offload}
  layer_kernels: ${model.layer_kernels}

encoder:
  _target_: anemoi.models.layers.mapper.GraphTransformerForwardMapper
  trainable_size: ${model.trainable_parameters.data2hidden}
  sub_graph_edge_attributes: ${model.attributes.edges}
  num_chunks: 1
  mlp_hidden_ratio: 4 # GraphTransformer or Transformer only
  num_heads: 4 # GraphTransformer or Transformer only
  qk_norm: True
  cpu_offload: ${model.cpu_offload}
  layer_kernels: ${model.layer_kernels}
  shard_strategy: "heads"


decoder:
  _target_: anemoi.models.layers.mapper.GraphTransformerBackwardMapper
  trainable_size: ${model.trainable_parameters.hidden2data}
  sub_graph_edge_attributes: ${model.attributes.edges}
  num_chunks: 1
  mlp_hidden_ratio: 4 # GraphTransformer or Transformer only
  num_heads: 4 # GraphTransformer or Transformer only
  initialise_data_extractor_zero: False
  qk_norm: True
  cpu_offload: ${model.cpu_offload}
  layer_kernels: ${model.layer_kernels}
  shard_strategy: "heads"

output_mask:
  _target_: anemoi.training.utils.masks.NoOutputMask

trainable_parameters:
  data: 0
  hidden: 0
  data2hidden: 0
  hidden2data: 0
  hidden2hidden: 0 # GNN and GraphTransformer Processor only


attributes:
  edges:
  - edge_length
  - edge_dirs
  nodes: []

# Bounding configuration
bounding: []
