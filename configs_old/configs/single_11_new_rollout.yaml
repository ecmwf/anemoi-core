defaults:
- data: zarr_new
- dataloader: native_grid_new
- datamodule: single
- diagnostics: evaluation
- hardware: slurm
- graph: encoder_decoder_only
- model: transformer_single_new
- training: default
- _self_

config_validation: True

### This file is for local experimentation.
##  When you commit your changes, assign the new features and keywords
##  to the correct defaults.
# For example to change from default GPU count:
# hardware:
#   num_gpus_per_node: 1

hardware:
  files:
    dataset: aifs-od-an-oper-0001-mars-n320-2016-2023-6h-v8.zarr
    dataset_land: aifs-od-an-oper-0001-mars-n320-2016-2023-6h-v1-land.zarr
    graph: graph_n320.pt
  accelerator: auto
  num_gpus_per_model: 1

graph:
  overwrite: False

diagnostics:
  plot:
    callbacks: []
  log:
    mlflow:
      enabled: True
      offline: True
      experiment_name: 'aifs-single-v2'
      run_name: "AIFS 1.1 baseline"
      terminal: True

model:
  num_channels: 1024

dataloader:
  num_workers:
    training: 1
    validation: 1
    test: 1
  batch_size:
    training: 1
    validation: 1
  limit_batches:
    training: null
    validation: 100

training:
  load_weights_only: False
  max_epochs: 13
  max_steps: 12000
  lr:
    rate: 8e-7  # effective batchsize is 16
    iterations: 7900
    min: 3e-7  # Not scaled by GPU
    warmup: 100
  rollout:
    start: 10
    epoch_increment: 1
    max: 12
