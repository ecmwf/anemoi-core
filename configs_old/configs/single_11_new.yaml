defaults:
- data: zarr_new
- dataloader: native_grid_new
- datamodule: single
- diagnostics: evaluation
- hardware: slurm
- graph: encoder_decoder_only
- model: transformer_single_new
- training: default
- _self_

config_validation: True

### This file is for local experimentation.
##  When you commit your changes, assign the new features and keywords
##  to the correct defaults.
# For example to change from default GPU count:
# hardware:
#   num_gpus_per_node: 1

hardware:
  accelerator: auto
  num_gpus_per_model: 1
  files:
    graph: graph_n320.pt

graph:
  overwrite: False

diagnostics:
  plot:
    callbacks: []
  log:
    mlflow:
      enabled: True
      offline: True
      experiment_name: 'aifs-single-v2'
      run_name: "AIFS 1.1 baseline"
      terminal: True

model:
  num_channels: 1024

dataloader:
  batch_size:
    training: 1
    validation: 1
  limit_batches:
    training: null
    validation: 100

training:
  # max_epochs: 67
  max_steps: 260000
  lr:
    rate: 3.125e-5  # effective batchsize is 16
    iterations: 260000
    min: 3e-7  # Not scaled by GPU
