name: Weekly PR Bulletin

on:
  schedule:
    - cron: "0 8 * * 1"  # Every Monday at 08:00 UTC
  workflow_dispatch:      # Allow manual trigger
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  issues: write

jobs:
  bulletin:
    name: Generate Weekly PR Bulletin
    runs-on: ubuntu-latest

    steps:
      - name: Collect PRs and build bulletin
        id: bulletin
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const now = new Date();
            const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);

            const { owner, repo } = context.repo;

            // ── helpers ──────────────────────────────────────────────────────────

            // Fetch all pages for a paginated GitHub REST call
            async function paginate(method, params) {
              const items = [];
              let page = 1;
              while (true) {
                const { data } = await method({ ...params, per_page: 100, page });
                items.push(...data);
                if (data.length < 100) break;
                page++;
              }
              return items;
            }

            // Determine which anemoi-core component a PR touches based on labels /
            // changed files path prefixes
            function classifyPR(pr, files) {
              const labelNames = pr.labels.map(l => l.name.toLowerCase());
              const components = new Set();

              const labelMap = {
                graphs:   ['graphs', 'anemoi-graphs'],
                models:   ['models', 'anemoi-models'],
                training: ['training', 'anemoi-training'],
              };
              for (const [comp, keywords] of Object.entries(labelMap)) {
                if (keywords.some(k => labelNames.some(l => l.includes(k)))) {
                  components.add(comp);
                }
              }

              if (files) {
                for (const f of files) {
                  if (f.startsWith('graphs/'))   components.add('graphs');
                  if (f.startsWith('models/'))   components.add('models');
                  if (f.startsWith('training/')) components.add('training');
                }
              }

              return components.size > 0 ? [...components].sort() : ['core'];
            }

            // Extract a short readable summary from the PR description
            function summarizePR(pr) {
              if (!pr.body) return null;
              const cleaned = pr.body
                .replace(/<!--[\s\S]*?-->/g, '')          // strip HTML comments
                .replace(/^\s*[-*]\s*\[[ x]\].*/gm, '')  // strip checkboxes
                .replace(/^\s*#{1,6}\s+.*/gm, '')        // strip headings
                .replace(/^\s*[-*]{3,}\s*$/gm, '')       // strip horizontal rules
                .replace(/\r/g, '');
              const paragraphs = cleaned.split(/\n{2,}/).map(p => p.trim()).filter(Boolean);
              const first = paragraphs.find(p => p.length > 15);
              if (!first) return null;
              const plain = first.replace(/\*+([^*]+)\*+/g, '$1').replace(/`([^`]+)`/g, '$1').trim();
              return plain.length > 200 ? plain.slice(0, 197) + '\u2026' : plain;
            }

            // Detect PRs carrying breaking changes (! in title per conventional commits)
            function isBreakingConfigPR(pr, files) {
              return /!/.test(pr.title);
            }

            // Detect release PRs (created by release-please or similar)
            function isReleasePR(pr) {
              const labels = pr.labels.map(l => l.name.toLowerCase());
              if (labels.some(l => l.includes('autorelease') || l.includes('release'))) return true;
              if (/^chore\(main\): release/i.test(pr.title)) return true;
              if (pr.user && pr.user.login === 'release-please[bot]') return true;
              return false;
            }

            // ── fetch PRs opened in the last 7 days ──────────────────────────────
            const allPRs = await paginate(
              github.rest.pulls.list,
              { owner, repo, state: 'all', sort: 'created', direction: 'desc' }
            );

            const opened = allPRs.filter(pr => new Date(pr.created_at) >= weekAgo);

            const merged = allPRs.filter(
              pr => pr.merged_at && new Date(pr.merged_at) >= weekAgo
            );

            // ── separate release PRs ──────────────────────────────────────────
            const releasePRs = merged.filter(pr => isReleasePR(pr));
            const nonReleaseOpened = opened.filter(pr => !isReleasePR(pr));
            const nonReleaseMerged = merged.filter(pr => !isReleasePR(pr));

            // ── classify each PR by component ────────────────────────────────────
            async function withComponents(prs) {
              const result = [];
              for (const pr of prs) {
                let files = null;
                try {
                  const { data } = await github.rest.pulls.listFiles({
                    owner, repo, pull_number: pr.number, per_page: 100,
                  });
                  files = data.map(f => f.filename);
                } catch (_) {}
                result.push({ pr, components: classifyPR(pr, files), files });
              }
              return result;
            }

            const [openedWithComp, mergedWithComp] = await Promise.all([
              withComponents(nonReleaseOpened),
              withComponents(nonReleaseMerged),
            ]);

            // ── group by component ───────────────────────────────────────────────
            function groupByComponent(items) {
              const groups = {};
              for (const { pr, components, files } of items) {
                for (const comp of components) {
                  (groups[comp] = groups[comp] || []).push({ pr, files });
                }
              }
              return groups;
            }

            const openedByComp = groupByComponent(openedWithComp);
            const mergedByComp = groupByComponent(mergedWithComp);

            const allComponents = [
              ...new Set([
                ...Object.keys(openedByComp),
                ...Object.keys(mergedByComp),
              ]),
            ].sort();

            // ── breaking config PRs ───────────────────────────────────────────────
            const breakingMerged = mergedWithComp.filter(({ pr, files }) => isBreakingConfigPR(pr, files));
            const breakingOpen   = openedWithComp.filter(({ pr, files }) =>
              isBreakingConfigPR(pr, files) && !mergedWithComp.some(m => m.pr.number === pr.number)
            );

            // ── contributors ──────────────────────────────────────────────────────
            const contributorLogins = new Set();
            for (const pr of [...opened, ...merged]) {
              if (pr.user) contributorLogins.add(pr.user.login);
            }

            // ── date range ────────────────────────────────────────────────────────
            const fmt = d => d.toISOString().slice(0, 10);

            // ── build markdown bulletin ───────────────────────────────────────────
            const compEmoji = { core: '⚙️', training: '🏋️', models: '🧠', graphs: '🕸️' };

            function prLine(pr, files) {
              const author = pr.user ? pr.user.login : 'unknown';
              const flag = isBreakingConfigPR(pr, files) ? ' ⚠️' : '';
              const summary = summarizePR(pr);
              const line = `- [#${pr.number}](${pr.html_url})${flag} **${pr.title.trim()}** — ${author}`;
              return summary ? `${line}\n  > ${summary}` : line;
            }

            const compOrder = ['core', 'training', 'models', 'graphs'];
            const allComponentsSorted = [
              ...compOrder.filter(c => allComponents.includes(c)),
              ...allComponents.filter(c => !compOrder.includes(c)).sort(),
            ];

            const lines = [];
            lines.push(`## 📋 anemoi-core Weekly PR Bulletin`);
            lines.push(`**Period:** ${fmt(weekAgo)} – ${fmt(now)}`);
            lines.push('');
            lines.push(`| Metric | Count |`);
            lines.push(`|--------|-------|`);
            lines.push(`| PRs opened | ${opened.length} |`);
            lines.push(`| PRs merged | ${merged.length} |`);
            lines.push(`| 🚀 Releases | ${releasePRs.length} |`);
            lines.push(`| ⚠️ Breaking / config | ${breakingMerged.length + breakingOpen.length} |`);
            lines.push(`| Contributors | ${contributorLogins.size} |`);

            if (contributorLogins.size > 0) {
              lines.push('');
              lines.push(`**Contributors:** ${[...contributorLogins].join(', ')}`);
            }

            if (breakingMerged.length > 0 || breakingOpen.length > 0) {
              lines.push('');
              lines.push(`### ⚠️ Breaking / Config-Schema Changes`);
              if (breakingMerged.length > 0) {
                lines.push('');
                lines.push(`**Merged (${breakingMerged.length})**`);
                for (const { pr, files } of breakingMerged) lines.push(prLine(pr, files));
              }
              if (breakingOpen.length > 0) {
                lines.push('');
                lines.push(`**Open (${breakingOpen.length})**`);
                for (const { pr, files } of breakingOpen) lines.push(prLine(pr, files));
              }
            }

            if (releasePRs.length > 0) {
              lines.push('');
              lines.push(`### 🚀 Releases`);
              for (const pr of releasePRs) lines.push(prLine(pr, null));
            }

            for (const comp of allComponentsSorted) {
              const emoji = compEmoji[comp] || '📦';
              lines.push('');
              lines.push(`### ${emoji} ${comp.charAt(0).toUpperCase() + comp.slice(1)}`);

              const compMerged = mergedByComp[comp] || [];
              const compOpened = openedByComp[comp] || [];

              if (compMerged.length > 0) {
                lines.push('');
                lines.push(`**Merged (${compMerged.length})**`);
                for (const { pr, files } of compMerged) lines.push(prLine(pr, files));
              }
              if (compOpened.length > 0) {
                lines.push('');
                lines.push(`**Opened (${compOpened.length})**`);
                for (const { pr, files } of compOpened) lines.push(prLine(pr, files));
              }
            }

            if (allComponents.length === 0) {
              lines.push('');
              lines.push('_No pull request activity this week._');
            }

            lines.push('');
            lines.push('---');
            lines.push(`_Generated by the [Weekly PR Bulletin](https://github.com/${owner}/${repo}/actions/workflows/weekly-pr-bulletin.yml) workflow._`);

            core.setOutput('body', lines.join('\n'));

            // ── post comment on issue #1262 ────────────────────────────────────────────
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: 1262,
              body: lines.join('\n'),
            });

            console.log(`Bulletin posted to issue #1262 (${opened.length} opened, ${merged.length} merged).`);
