name: Weekly PR Bulletin

on:
  schedule:
    - cron: "0 8 * * 1"  # Every Monday at 08:00 UTC
  workflow_dispatch:      # Allow manual trigger
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  bulletin:
    name: Generate Weekly PR Bulletin
    runs-on: ubuntu-latest

    steps:
      - name: Collect PRs and post to Teams
        uses: actions/github-script@v7
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const now = new Date();
            const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);

            const { owner, repo } = context.repo;

            // ── helpers ──────────────────────────────────────────────────────────

            // Fetch all pages for a paginated GitHub REST call
            async function paginate(method, params) {
              const items = [];
              let page = 1;
              while (true) {
                const { data } = await method({ ...params, per_page: 100, page });
                items.push(...data);
                if (data.length < 100) break;
                page++;
              }
              return items;
            }

            // Determine which anemoi-core component a PR touches based on labels /
            // changed files path prefixes
            function classifyPR(pr, files) {
              const labelNames = pr.labels.map(l => l.name.toLowerCase());
              const components = new Set();

              const labelMap = {
                graphs:   ['graphs', 'anemoi-graphs'],
                models:   ['models', 'anemoi-models'],
                training: ['training', 'anemoi-training'],
              };
              for (const [comp, keywords] of Object.entries(labelMap)) {
                if (keywords.some(k => labelNames.some(l => l.includes(k)))) {
                  components.add(comp);
                }
              }

              if (files) {
                for (const f of files) {
                  if (f.startsWith('graphs/'))   components.add('graphs');
                  if (f.startsWith('models/'))   components.add('models');
                  if (f.startsWith('training/')) components.add('training');
                }
              }

              return components.size > 0 ? [...components].sort() : ['core'];
            }

            // Extract a short readable summary from the PR description
            function summarizePR(pr) {
              if (!pr.body) return null;
              const cleaned = pr.body
                .replace(/<!--[\s\S]*?-->/g, '')          // strip HTML comments
                .replace(/^\s*[-*]\s*\[[ x]\].*/gm, '')  // strip checkboxes
                .replace(/^\s*#{1,6}\s+.*/gm, '')        // strip headings
                .replace(/^\s*[-*]{3,}\s*$/gm, '')       // strip horizontal rules
                .replace(/\r/g, '');
              const paragraphs = cleaned.split(/\n{2,}/).map(p => p.trim()).filter(Boolean);
              const first = paragraphs.find(p => p.length > 15);
              if (!first) return null;
              const plain = first.replace(/\*+([^*]+)\*+/g, '$1').replace(/`([^`]+)`/g, '$1').trim();
              return plain.length > 200 ? plain.slice(0, 197) + '\u2026' : plain;
            }

            // Detect PRs carrying breaking changes or config-schema modifications
            const BREAKING_LABELS = ['breaking-change', 'breaking', 'config-change', 'configuration', 'deprecation'];
            const CONFIG_FILE_PATTERNS = [/\.ya?ml$/, /\.json$/, /\.toml$/, /\.cfg$/, /\.ini$/, /conf\.py$/];

            function isBreakingConfigPR(pr, files) {
              const labels = pr.labels.map(l => l.name.toLowerCase());
              if (BREAKING_LABELS.some(bl => labels.includes(bl))) return true;
              if (/breaking/i.test(pr.title)) return true;
              if (/!/.test(pr.title)) return true;
              if (pr.body && /breaking[\s_-]?change/i.test(pr.body)) return true;
              if (files) {
                const hasConfigChange = files.some(f =>
                  !f.includes('/tests/') && !f.includes('/docs/') &&
                  CONFIG_FILE_PATTERNS.some(p => p.test(f))
                );
                if (hasConfigChange) return true;
              }
              return false;
            }

            // ── fetch PRs opened in the last 7 days ──────────────────────────────
            const allPRs = await paginate(
              github.rest.pulls.list,
              { owner, repo, state: 'all', sort: 'created', direction: 'desc' }
            );

            const opened = allPRs.filter(pr => new Date(pr.created_at) >= weekAgo);

            const merged = allPRs.filter(
              pr => pr.merged_at && new Date(pr.merged_at) >= weekAgo
            );

            // ── classify each PR by component ────────────────────────────────────
            async function withComponents(prs) {
              const result = [];
              for (const pr of prs) {
                let files = null;
                try {
                  const { data } = await github.rest.pulls.listFiles({
                    owner, repo, pull_number: pr.number, per_page: 100,
                  });
                  files = data.map(f => f.filename);
                } catch (_) {}
                result.push({ pr, components: classifyPR(pr, files), files });
              }
              return result;
            }

            const [openedWithComp, mergedWithComp] = await Promise.all([
              withComponents(opened),
              withComponents(merged),
            ]);

            // ── group by component ───────────────────────────────────────────────
            function groupByComponent(items) {
              const groups = {};
              for (const { pr, components, files } of items) {
                for (const comp of components) {
                  (groups[comp] = groups[comp] || []).push({ pr, files });
                }
              }
              return groups;
            }

            const openedByComp = groupByComponent(openedWithComp);
            const mergedByComp = groupByComponent(mergedWithComp);

            const allComponents = [
              ...new Set([
                ...Object.keys(openedByComp),
                ...Object.keys(mergedByComp),
              ]),
            ].sort();

            // ── breaking config PRs ───────────────────────────────────────────────
            const seenBreaking = new Set();
            const breakingPRs = [...openedWithComp, ...mergedWithComp].filter(({ pr, files }) => {
              if (seenBreaking.has(pr.number)) return false;
              if (!isBreakingConfigPR(pr, files)) return false;
              seenBreaking.add(pr.number);
              return true;
            });

            // ── contributors ──────────────────────────────────────────────────────
            const contributorLogins = new Set();
            for (const pr of [...opened, ...merged]) {
              if (pr.user) contributorLogins.add(pr.user.login);
            }

            // ── date range ────────────────────────────────────────────────────────
            const fmt = d => d.toISOString().slice(0, 10);
            const dateRange = `${fmt(weekAgo)} – ${fmt(now)}`;
            const repoUrl = `https://github.com/${owner}/${repo}`;

            // ── build Teams Adaptive Card ─────────────────────────────────────────
            const compEmoji = { graphs: '🕸️', models: '🧠', training: '🏋️', core: '⚙️' };

            // Render a PR as TextBlocks: title line + optional auto-extracted summary
            function prBlocks(pr, files) {
              const author = pr.user ? pr.user.login : 'unknown';
              const flag = isBreakingConfigPR(pr, files) ? ' ⚠️' : '';
              const blocks = [
                {
                  type: 'TextBlock',
                  text: `[#${pr.number}](${pr.html_url})${flag} **${pr.title.trim()}** — @${author}`,
                  wrap: true,
                  size: 'Small',
                },
              ];
              const summary = summarizePR(pr);
              if (summary) {
                blocks.push({
                  type: 'TextBlock',
                  text: summary,
                  wrap: true,
                  size: 'Small',
                  isSubtle: true,
                  spacing: 'None',
                });
              }
              return blocks;
            }

            const summaryFacts = [
              { title: 'Period',                 value: dateRange },
              { title: 'PRs opened',             value: String(opened.length) },
              { title: 'PRs merged',             value: String(merged.length) },
              { title: '\u26a0\ufe0f Breaking / config', value: String(breakingPRs.length) },
              { title: 'Contributors',           value: String(contributorLogins.size) },
            ];
            if (contributorLogins.size > 0) {
              summaryFacts.push({ title: 'Who', value: [...contributorLogins].join(', ') });
            }

            const bodyBlocks = [];

            // Breaking changes alert — shown at the top before component sections
            if (breakingPRs.length > 0) {
              bodyBlocks.push({
                type: 'TextBlock',
                text: '\u26a0\ufe0f Breaking / Config-Schema Changes',
                weight: 'Bolder',
                size: 'Medium',
                color: 'Warning',
                spacing: 'Medium',
              });
              for (const { pr, files } of breakingPRs) {
                bodyBlocks.push(...prBlocks(pr, files));
              }
            }

            if (allComponents.length === 0) {
              bodyBlocks.push({
                type: 'TextBlock',
                text: 'No pull request activity this week.',
                isSubtle: true,
                wrap: true,
              });
            }

            for (const comp of allComponents) {
              const emoji = compEmoji[comp] || '📦';
              bodyBlocks.push({
                type: 'TextBlock',
                text: `${emoji} ${comp.charAt(0).toUpperCase() + comp.slice(1)}`,
                weight: 'Bolder',
                size: 'Medium',
                spacing: 'Large',
              });

              const compMerged = mergedByComp[comp] || [];
              const compOpened = openedByComp[comp] || [];

              if (compMerged.length > 0) {
                bodyBlocks.push({ type: 'TextBlock', text: `Merged (${compMerged.length})`, weight: 'Bolder', size: 'Small', spacing: 'Small' });
                for (const { pr, files } of compMerged) bodyBlocks.push(...prBlocks(pr, files));
              }
              if (compOpened.length > 0) {
                bodyBlocks.push({ type: 'TextBlock', text: `Opened (${compOpened.length})`, weight: 'Bolder', size: 'Small', spacing: 'Small' });
                for (const { pr, files } of compOpened) bodyBlocks.push(...prBlocks(pr, files));
              }
            }

            const card = {
              type: 'message',
              attachments: [
                {
                  contentType: 'application/vnd.microsoft.card.adaptive',
                  content: {
                    $schema: 'http://adaptivecards.io/schemas/adaptive-card.json',
                    type: 'AdaptiveCard',
                    version: '1.5',
                    body: [
                      { type: 'TextBlock', text: '📋 anemoi-core Weekly PR Bulletin', weight: 'Bolder', size: 'Large' },
                      { type: 'FactSet', facts: summaryFacts },
                      ...bodyBlocks,
                      { type: 'TextBlock', text: `[View all PRs on GitHub](${repoUrl}/pulls)`, size: 'Small', isSubtle: true, spacing: 'Large', wrap: true },
                    ],
                  },
                },
              ],
            };

            // ── POST to Teams webhook ─────────────────────────────────────────────
            const webhookUrl = process.env.TEAMS_WEBHOOK_URL;
            if (!webhookUrl) {
              throw new Error('TEAMS_WEBHOOK_URL secret is not set.');
            }

            const response = await fetch(webhookUrl, {
              method:  'POST',
              headers: { 'Content-Type': 'application/json' },
              body:    JSON.stringify(card),
            });

            if (!response.ok) {
              const text = await response.text();
              throw new Error(`Teams webhook returned ${response.status}: ${text}`);
            }

            console.log(`Bulletin posted to Teams (${opened.length} opened, ${merged.length} merged).`);
