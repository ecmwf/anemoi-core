name: distributed-primitive-tests-hpc-gpu

on:
  workflow_dispatch:

jobs:
  distributed-primitive-tests:
    runs-on: hpc
    timeout-minutes: 60
    steps:
      - uses: ecmwf-actions/reusable-workflows/ci-hpc-generic@v2
        with:
          template: |
            env | grep SLURM # helps with debugging
            set -eux
            module load python3/3.12.9-01
            REPO_NAME=anemoi-core
            REPO_BRANCH=${{ github.head_ref || github.ref_name }}
            cd $TMPDIR
            git clone -b $REPO_BRANCH https://${{ secrets.GH_REPO_READ_TOKEN }}@github.com/ecmwf/${REPO_NAME}.git
            cd $REPO_NAME
            python3 -m venv .venv
            source .venv/bin/activate
            pip install --upgrade pip
            pip install -e ./training[all,tests] -e ./models[all,tests] -e ./graphs[all,tests]

            python3 -m pytest -q models/tests/distributed/test_communication_primitives.py \
              --distributed \
              --distributed-backend=all \
              --distributed-world-size=2

            deactivate
            rm -rf $REPO_NAME
          sbatch_options: |
            #SBATCH --job-name=anemoi_core_dist_primitives
            #SBATCH --nodes=1
            #SBATCH --ntasks=1
            #SBATCH --cpus-per-task=4
            #SBATCH --gpus-per-node=2
            #SBATCH --time=00:30:00
            #SBATCH --qos=ng
            #SBATCH --mem=64G
          troika_user: ${{ secrets.HPC_CI_INTEGRATION_USER }}
