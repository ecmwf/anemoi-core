name: nightly-integration-tests-hpc-gpu

 # Controls when the workflow will run
on:
  schedule:
    - cron: "0 23 * * *"  # every day at 23pm on default(main) branch
  workflow_dispatch:
  merge_group:

jobs:
  check_date:
    runs-on: ubuntu-latest
    name: Check latest commit
    outputs:
      should_run: ${{ steps.should_run.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
      - name: print latest_commit
        run: echo ${{ github.sha }}
      - id: should_run
        continue-on-error: true
        name: check latest commit is less than a day
        if: ${{ github.event_name == 'schedule' }}
        run: test -z $(git rev-list  --after="24 hours"  ${{ github.sha }}) && echo "::set-output name=should_run::false"
  integration-tests:
    name: ${{ matrix.test_name }}
    runs-on: hpc
    timeout-minutes: ${{ matrix.timeout_minutes }}
    needs: check_date
    if: ${{ needs.check_date.outputs.should_run != 'false' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - test_name: test_accuracy
            pip_extras: all,tests
            pytest_cmd: python3 -m pytest -v training/tests/integration/test_accuracy.py --slow --mlflow --mlflow-server=${{ secrets.MLFLOW_TEST_URL }}
            timeout_minutes: 120
            sbatch_options: |
              #SBATCH --job-name=anemoi_core_pytest_accuracy
              #SBATCH --time=01:00:00
              #SBATCH --qos=ng
              #SBATCH --gpus=1
              #SBATCH --gres=gpu:1
              #SBATCH --mem=64G
          - test_name: test_benchmark
            pip_extras: all,tests,profile
            pytest_cmd: srun python -m pytest -v training/tests/integration/test_benchmark.py --slow --multigpu
            timeout_minutes: 360
            sbatch_options: |
              #SBATCH --job-name=anemoi_core_benchmark_pytest
              #SBATCH --nodes=1
              #SBATCH --ntasks-per-node=2
              #SBATCH --cpus-per-task=32
              #SBATCH --gpus-per-node=2
              #SBATCH --time=1:00:00
              #SBATCH --qos=ng
              #SBATCH --mem=0
          - test_name: test_training_cycle
            pip_extras: all,tests
            pytest_cmd: python3 -m pytest -v training/tests/integration/test_training_cycle.py --slow --mlflow --mlflow-server=${{ secrets.MLFLOW_TEST_URL }}
            timeout_minutes: 120
            sbatch_options: |
              #SBATCH --job-name=anemoi_core_pytest_training_cycle
              #SBATCH --time=01:00:00
              #SBATCH --qos=ng
              #SBATCH --gpus=1
              #SBATCH --gres=gpu:1
              #SBATCH --mem=64G
    steps:
      - uses: ecmwf-actions/reusable-workflows/ci-hpc-generic@v2
        with:
          template: |
            env | grep SLURM # helps with debugging
            set -eux
            module load python3/3.12.9-01
            REPO_NAME=anemoi-core
            REPO_BRANCH=${{ github.head_ref || github.ref_name }}
            cd $TMPDIR
            git clone -b $REPO_BRANCH https://${{ secrets.GH_REPO_READ_TOKEN }}@github.com/ecmwf/${REPO_NAME}.git
            cd $REPO_NAME
            python3 -m venv .venv
            source .venv/bin/activate
            pip install --upgrade pip
            pip install -e ./training[${{ matrix.pip_extras }}] -e ./models[all,tests] -e ./graphs[all,tests]
            ${{ matrix.pytest_cmd }}
            deactivate
            rm -rf $REPO_NAME
          sbatch_options: ${{ matrix.sbatch_options }}
          troika_user: ${{ secrets.HPC_CI_INTEGRATION_USER }}

  notify-team:
    needs: integration-tests
    if: failure() && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - name: Add failure comment
        uses: peter-evans/create-or-update-comment@v3
        with:
          issue-number: 294
          body: |
            ## 🚨 Nightly Job Failed

            **Repository:** ${{ github.repository }}
            **Workflow:** ${{ github.workflow }}
            **Run URL:** [View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            **Time:** ${{ github.event.schedule }}

            cc: @ecmwf/anemoisecurity
